<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <!-- Gradient vert-bleu pour fusion culturelle -->
        <linearGradient id="culturalBlend" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient jaune-orange -->
        <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient bleu clair pour swoosh -->
        <linearGradient id="lightSwoosh" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
        </linearGradient>
        
        <filter id="softShadow4">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="0" dy="1" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Fond blanc -->
    <rect width="200" height="200" fill="white" opacity="0.98"/>
    
    <!-- Design de lettre "S" pour "Solidarité" avec rubans dynamiques -->
    <g filter="url(#softShadow4)">
        <!-- Corps principal du S en forme de ruban -->
        <path d="M 120 55 Q 140 55 145 65 Q 148 72 140 78 L 105 95 Q 95 100 95 108 Q 95 115 105 118 L 130 125 Q 145 130 145 145 Q 145 160 125 160 L 80 160 Q 70 160 68 155 L 75 148 Q 78 152 85 152 L 120 152 Q 128 152 128 145 Q 128 138 120 135 L 90 125 Q 75 120 75 105 Q 75 90 90 85 L 125 70 Q 132 67 132 62 Q 132 57 125 57 L 85 57 Q 75 57 72 62 L 65 55 Q 68 52 80 52 Z" 
              fill="url(#culturalBlend)"/>
        
        <!-- Swoosh supérieur droit (jaune-orange) -->
        <path d="M 150 60 Q 165 55 172 68 Q 175 78 168 85 Q 162 88 155 82" 
              fill="url(#warmAccent)" opacity="0.8"/>
        
        <!-- Swoosh inférieur gauche (bleu clair) -->
        <path d="M 50 135 Q 35 140 28 127 Q 25 117 32 110 Q 38 107 45 113" 
              fill="url(#lightSwoosh)" opacity="0.8"/>
        
        <!-- Swoosh intermédiaire (vert) -->
        <path d="M 160 110 Q 172 108 178 118 Q 180 125 173 130 Q 168 132 162 127" 
              fill="#10b981" opacity="0.7"/>
        
        <!-- Pièce de puzzle intégrée -->
        <g transform="translate(100, 100)">
            <circle cx="0" cy="-3" r="2.5" fill="#dbeafe"/>
            <rect x="-5" y="-1.5" width="10" height="10" fill="#3b82f6" rx="1"/>
            <path d="M 5 2.5 Q 7.5 4 5 5.5" fill="white"/>
        </g>
    </g>
    
    <!-- Petits détails de puzzle autour -->
    <g opacity="0.6">
        <g transform="translate(40, 75)">
            <circle cx="0" cy="-1.5" r="1.5" fill="#10b981"/>
            <rect x="-3" y="-0.5" width="6" height="6" fill="#00853f" rx="0.5"/>
        </g>
        <g transform="translate(160, 145)">
            <circle cx="0" cy="-1.5" r="1.5" fill="#fbbf24"/>
            <rect x="-3" y="-0.5" width="6" height="6" fill="#f9ca24" rx="0.5"/>
        </g>
    </g>
    
    <!-- Texte -->
    <text x="100" y="175" font-family="Inter, Arial, sans-serif" font-size="7" font-weight="600" 
          fill="#1f2937" text-anchor="middle" textLength="130" lengthAdjust="spacing">
        ENSEMBLE POUR L'AUTISME
    </text>
    
    <!-- Sous-titre "Solidarité" -->
    <text x="100" y="185" font-family="Inter, Arial, sans-serif" font-size="5" font-weight="500" 
          fill="#6b7280" text-anchor="middle">
        Solidarité • Sénégal
    </text>
</svg>
