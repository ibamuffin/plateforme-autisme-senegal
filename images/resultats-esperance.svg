<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrière-plan -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0.3" />
    </linearGradient>
    
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FEF08A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#skyGrad)"/>
  
  <!-- Soleil de l'espoir -->
  <circle cx="320" cy="60" r="35" fill="url(#sunGrad)" opacity="0.9"/>
  <g transform="translate(320, 60)">
    <line x1="-50" y1="0" x2="-40" y2="0" stroke="#F59E0B" stroke-width="3"/>
    <line x1="40" y1="0" x2="50" y2="0" stroke="#F59E0B" stroke-width="3"/>
    <line x1="0" y1="-50" x2="0" y2="-40" stroke="#F59E0B" stroke-width="3"/>
    <line x1="0" y1="40" x2="0" y2="50" stroke="#F59E0B" stroke-width="3"/>
    <line x1="-35" y1="-35" x2="-30" y2="-30" stroke="#F59E0B" stroke-width="3"/>
    <line x1="30" y1="30" x2="35" y2="35" stroke="#F59E0B" stroke-width="3"/>
    <line x1="35" y1="-35" x2="30" y2="-30" stroke="#F59E0B" stroke-width="3"/>
    <line x1="-30" y1="30" x2="-35" y2="35" stroke="#F59E0B" stroke-width="3"/>
  </g>
  
  <!-- Chemin vers l'avenir -->
  <path d="M 50 250 Q 150 200 250 220 Q 350 240 380 200" 
        stroke="#10B981" stroke-width="8" fill="none" opacity="0.7"/>
  
  <!-- Famille sénégalaise heureuse -->
  <!-- Père -->
  <g transform="translate(80, 180)">
    <circle cx="0" cy="0" r="20" fill="#8B4513"/>
    <path d="M -18 -12 Q -22 -20 -15 -25 Q 0 -28 15 -25 Q 22 -20 18 -12" fill="#2F1B14"/>
    <circle cx="-6" cy="-4" r="2" fill="white"/>
    <circle cx="6" cy="-4" r="2" fill="white"/>
    <circle cx="-6" cy="-4" r="1" fill="black"/>
    <circle cx="6" cy="-4" r="1" fill="black"/>
    <path d="M -12 8 Q 0 16 12 8" stroke="black" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="40" rx="25" ry="40" fill="#2563EB"/>
    <ellipse cx="-35" cy="30" rx="12" ry="30" fill="#8B4513" transform="rotate(-20)"/>
    <ellipse cx="35" cy="35" rx="12" ry="30" fill="#8B4513" transform="rotate(25)"/>
    <ellipse cx="-12" cy="85" rx="10" ry="30" fill="#1F2937"/>
    <ellipse cx="12" cy="85" rx="10" ry="30" fill="#1F2937"/>
  </g>
  
  <!-- Mère -->
  <g transform="translate(140, 175)">
    <circle cx="0" cy="0" r="18" fill="#D2B48C"/>
    <path d="M -16 -10 Q -20 -18 -12 -22 Q 0 -25 12 -22 Q 20 -18 16 -10 L 16 8 Q 12 12 8 8 L 8 -8 L -8 -8 L -8 8 Q -12 12 -16 8 Z" fill="#8B4513"/>
    <circle cx="-5" cy="-3" r="2" fill="white"/>
    <circle cx="5" cy="-3" r="2" fill="white"/>
    <circle cx="-5" cy="-3" r="1" fill="black"/>
    <circle cx="5" cy="-3" r="1" fill="black"/>
    <path d="M -10 6 Q 0 14 10 6" stroke="black" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="35" rx="22" ry="35" fill="#EC4899"/>
    <ellipse cx="-30" cy="25" rx="10" ry="25" fill="#D2B48C" transform="rotate(-25)"/>
    <ellipse cx="30" cy="30" rx="10" ry="25" fill="#D2B48C" transform="rotate(30)"/>
    <ellipse cx="-10" cy="80" rx="8" ry="25" fill="#7C2D92"/>
    <ellipse cx="10" cy="80" rx="8" ry="25" fill="#7C2D92"/>
  </g>
  
  <!-- Enfant avec TSA épanoui -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="15" fill="#FDBCB4"/>
    <path d="M -12 -8 Q -15 -15 -8 -18 Q 0 -20 8 -18 Q 15 -15 12 -8" fill="#654321"/>
    <circle cx="-4" cy="-3" r="1.5" fill="white"/>
    <circle cx="4" cy="-3" r="1.5" fill="white"/>
    <circle cx="-4" cy="-3" r="0.8" fill="black"/>
    <circle cx="4" cy="-3" r="0.8" fill="black"/>
    <!-- Grand sourire expressif -->
    <path d="M -10 5 Q 0 15 10 5" stroke="black" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="25" rx="18" ry="25" fill="#10B981"/>
    <!-- Bras levés de joie -->
    <ellipse cx="-25" cy="15" rx="8" ry="20" fill="#FDBCB4" transform="rotate(-45)"/>
    <ellipse cx="25" cy="15" rx="8" ry="20" fill="#FDBCB4" transform="rotate(45)"/>
    <!-- Pièce de puzzle comme médaillon -->
    <g transform="translate(0, 15)">
      <rect x="-6" y="-6" width="12" height="12" fill="#2563EB" stroke="white" stroke-width="1" rx="2"/>
      <circle cx="6" cy="0" r="2" fill="#2563EB"/>
    </g>
    <ellipse cx="-8" cy="55" rx="6" ry="20" fill="#059669"/>
    <ellipse cx="8" cy="55" rx="6" ry="20" fill="#059669"/>
  </g>
  
  <!-- Professionnel de santé -->
  <g transform="translate(280, 185)">
    <circle cx="0" cy="0" r="18" fill="#F4A460"/>
    <path d="M -16 -10 Q -20 -18 -12 -22 Q 0 -25 12 -22 Q 20 -18 16 -10" fill="#2F1B14"/>
    <circle cx="-5" cy="-3" r="2" fill="white"/>
    <circle cx="5" cy="-3" r="2" fill="white"/>
    <circle cx="-5" cy="-3" r="1" fill="black"/>
    <circle cx="5" cy="-3" r="1" fill="black"/>
    <path d="M -10 6 Q 0 14 10 6" stroke="black" stroke-width="2" fill="none"/>
    <!-- Blouse médicale -->
    <ellipse cx="0" cy="35" rx="22" ry="35" fill="white"/>
    <rect x="-8" y="15" width="16" height="20" fill="white" stroke="#2563EB" stroke-width="2" rx="2"/>
    <text x="0" y="27" font-family="Arial" font-size="8" text-anchor="middle" fill="#2563EB">TSA</text>
    <!-- Stethoscope -->
    <ellipse cx="-15" cy="20" rx="3" ry="8" fill="#64748B" transform="rotate(-30)"/>
    <ellipse cx="15" cy="25" rx="3" ry="8" fill="#64748B" transform="rotate(30)"/>
    <circle cx="0" cy="35" r="4" fill="#64748B"/>
    <ellipse cx="-10" cy="80" rx="8" ry="25" fill="#1F2937"/>
    <ellipse cx="10" cy="80" rx="8" ry="25" fill="#1F2937"/>
  </g>
  
  <!-- Symboles de réussite -->
  <!-- Cœurs flottants -->
  <g opacity="0.8">
    <g transform="translate(120, 100)">
      <path d="M 0 5 Q -5 0 -10 5 Q -10 10 0 15 Q 10 10 10 5 Q 5 0 0 5" fill="#EF4444"/>
    </g>
    <g transform="translate(250, 80)">
      <path d="M 0 5 Q -5 0 -10 5 Q -10 10 0 15 Q 10 10 10 5 Q 5 0 0 5" fill="#EC4899"/>
    </g>
    <g transform="translate(180, 120)">
      <path d="M 0 5 Q -5 0 -10 5 Q -10 10 0 15 Q 10 10 10 5 Q 5 0 0 5" fill="#F59E0B"/>
    </g>
  </g>
  
  <!-- Étoiles de réussite -->
  <g opacity="0.7">
    <g transform="translate(100, 60)">
      <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#FFD700"/>
    </g>
    <g transform="translate(300, 120)">
      <polygon points="0,-6 1.5,-1.5 6,-1.5 2.25,1.5 3.75,6 0,3 -3.75,6 -2.25,1.5 -6,-1.5 -1.5,-1.5" fill="#F59E0B"/>
    </g>
    <g transform="translate(160, 50)">
      <polygon points="0,-6 1.5,-1.5 6,-1.5 2.25,1.5 3.75,6 0,3 -3.75,6 -2.25,1.5 -6,-1.5 -1.5,-1.5" fill="#10B981"/>
    </g>
  </g>
  
  <!-- École inclusive en arrière-plan -->
  <g transform="translate(50, 100)" opacity="0.6">
    <rect x="0" y="0" width="80" height="50" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
    <rect x="5" y="5" width="15" height="15" fill="#3B82F6" opacity="0.8"/>
    <rect x="25" y="5" width="15" height="15" fill="#3B82F6" opacity="0.8"/>
    <rect x="45" y="5" width="15" height="15" fill="#3B82F6" opacity="0.8"/>
    <rect x="65" y="5" width="10" height="40" fill="#8B4513"/>
    <polygon points="0,0 40,0 20,-15" fill="#EF4444" transform="translate(20, 0)"/>
    <text x="40" y="35" font-family="Arial" font-size="8" text-anchor="middle" fill="#1F2937">École Inclusive</text>
  </g>
  
  <!-- Message d'espoir -->
  <g transform="translate(200, 280)">
    <rect x="-120" y="-15" width="240" height="25" fill="white" opacity="0.9" rx="12"/>
    <text x="0" y="-2" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#1F2937">
      Un avenir prometteur pour nos enfants
    </text>
  </g>
  
  <!-- Arc-en-ciel symbolique -->
  <g transform="translate(200, 150)" opacity="0.8">
    <path d="M -80 0 Q 0 -40 80 0" stroke="#EF4444" stroke-width="4" fill="none"/>
    <path d="M -75 5 Q 0 -35 75 5" stroke="#F59E0B" stroke-width="4" fill="none"/>
    <path d="M -70 10 Q 0 -30 70 10" stroke="#EAB308" stroke-width="4" fill="none"/>
    <path d="M -65 15 Q 0 -25 65 15" stroke="#22C55E" stroke-width="4" fill="none"/>
    <path d="M -60 20 Q 0 -20 60 20" stroke="#3B82F6" stroke-width="4" fill="none"/>
    <path d="M -55 25 Q 0 -15 55 25" stroke="#6366F1" stroke-width="4" fill="none"/>
    <path d="M -50 30 Q 0 -10 50 30" stroke="#8B5CF6" stroke-width="4" fill="none"/>
  </g>
</svg>
