<svg width="400" height="350" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrière-plan -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="400" height="350" fill="url(#bgGrad)"/>
  
  <!-- Carte du Sénégal stylisée -->
  <g transform="translate(20, 20)" opacity="0.1">
    <path d="M 0 40 Q 10 20 30 25 Q 50 15 80 30 Q 90 40 85 60 Q 80 80 70 85 Q 50 90 30 85 Q 10 80 5 65 Q 0 55 0 40 Z" 
          fill="#00A651" stroke="#FFCD00" stroke-width="2"/>
    <text x="45" y="55" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFCD00">
      SÉNÉGAL
    </text>
  </g>
  
  <!-- Hôpital Fann avec architecture africaine -->
  <g transform="translate(30, 100)">
    <!-- Bâtiment principal -->
    <rect x="0" y="30" width="140" height="80" fill="#F5F5DC" stroke="#8B7355" stroke-width="2"/>
    
    <!-- Toit en tuiles rouges (style colonial/africain) -->
    <polygon points="0,30 70,10 140,30" fill="#CD853F"/>
    <polygon points="0,30 10,25 10,35" fill="#A0522D"/>
    <polygon points="130,30 140,25 140,35" fill="#A0522D"/>
    
    <!-- Fenêtres avec volets -->
    <rect x="15" y="45" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="45" y="45" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="75" y="45" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="105" y="45" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    
    <rect x="15" y="70" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="45" y="70" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="75" y="70" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <rect x="105" y="70" width="20" height="20" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Porte d'entrée -->
    <rect x="60" y="85" width="20" height="25" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    
    <!-- Croix médicale -->
    <g transform="translate(70, 20)">
      <rect x="-6" y="-2" width="12" height="4" fill="#DC143C"/>
      <rect x="-2" y="-6" width="4" height="12" fill="#DC143C"/>
    </g>
    
    <!-- Palmier à côté (contexte africain) -->
    <g transform="translate(150, 60)">
      <rect x="0" y="20" width="4" height="40" fill="#8B4513"/>
      <!-- Feuilles de palmier -->
      <path d="M 2 20 Q -5 10 -10 15 Q -5 20 2 20" fill="#228B22"/>
      <path d="M 2 20 Q 9 10 14 15 Q 9 20 2 20" fill="#228B22"/>
      <path d="M 2 20 Q -2 5 -8 8 Q -2 15 2 20" fill="#32CD32"/>
      <path d="M 2 20 Q 6 5 12 8 Q 6 15 2 20" fill="#32CD32"/>
    </g>
    
    <!-- Panneau en français -->
    <rect x="20" y="120" width="100" height="25" fill="white" stroke="#2563EB" stroke-width="2" rx="3"/>
    <text x="70" y="130" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#2563EB">
      CENTRE PÉDOPSYCHIATRIQUE
    </text>
    <text x="70" y="140" font-family="Arial" font-size="8" text-anchor="middle" fill="#2563EB">
      HÔPITAL FANN - DAKAR
    </text>
  </g>
  
  <!-- Statistiques OMS avec graphiques plus clairs -->
  <g transform="translate(220, 70)">
    <rect x="-10" y="-10" width="160" height="100" fill="white" stroke="#E5E7EB" stroke-width="2" rx="8"/>
    
    <text x="70" y="10" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1F2937">
      STATISTIQUES MONDIALES
    </text>
    
    <!-- Représentation visuelle 1/160 -->
    <g transform="translate(10, 25)">
      <!-- Fond pour les 160 personnes -->
      <rect x="0" y="0" width="120" height="30" fill="#E5E7EB" rx="5"/>
      
      <!-- Barre représentant 1 personne avec autisme -->
      <rect x="0" y="0" width="3" height="30" fill="#2563EB" rx="1"/>
      
      <!-- Texte explicatif -->
      <text x="60" y="45" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1F2937">
        1 personne sur 160
      </text>
      <text x="60" y="58" font-family="Arial" font-size="10" text-anchor="middle" fill="#6B7280">
        touchée par l'autisme (OMS)
      </text>
    </g>
  </g>
  
  <!-- Statistiques Sénégal avec contexte local -->
  <g transform="translate(220, 190)">
    <rect x="-10" y="-10" width="160" height="120" fill="white" stroke="#E5E7EB" stroke-width="2" rx="8"/>
    
    <text x="70" y="10" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1F2937">
      SITUATION AU SÉNÉGAL
    </text>
    
    <!-- Graphique en camembert simplifié -->
    <g transform="translate(70, 50)">
      <!-- Cercle complet -->
      <circle cx="0" cy="0" r="25" fill="#10B981" opacity="0.8"/>
      <!-- Segment autisme -->
      <path d="M 0 0 L 0 -25 A 25 25 0 0 1 2 -25 Z" fill="#F59E0B"/>
      
      <!-- Labels -->
      <text x="0" y="-35" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#F59E0B">
        0.8%
      </text>
      <text x="0" y="40" font-family="Arial" font-size="9" text-anchor="middle" fill="#1F2937">
        enfants avec TSA
      </text>
    </g>
    
    <text x="70" y="90" font-family="Arial" font-size="8" text-anchor="middle" fill="#6B7280">
      Source: Centre Pédopsychiatrique
    </text>
    <text x="70" y="100" font-family="Arial" font-size="8" text-anchor="middle" fill="#6B7280">
      Hôpital Fann, Dakar
    </text>
  </g>
  
  <!-- Défis spécifiques au Sénégal -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="180" height="120" fill="white" stroke="#E5E7EB" stroke-width="2" rx="8"/>
    
    <text x="90" y="20" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1F2937">
      DÉFIS AU SÉNÉGAL
    </text>
    
    <!-- Défis avec icônes et texte lisible -->
    <g transform="translate(15, 35)">
      <!-- Manque de spécialistes -->
      <circle cx="8" cy="8" r="6" fill="#EF4444"/>
      <text x="8" y="12" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">!</text>
      <text x="25" y="6" font-family="Arial" font-size="11" font-weight="bold" fill="#1F2937">Manque de spécialistes</text>
      <text x="25" y="18" font-family="Arial" font-size="9" fill="#6B7280">Pédopsychiatres, orthophonistes</text>
      
      <!-- Infrastructures limitées -->
      <g transform="translate(0, 25)">
        <circle cx="8" cy="8" r="6" fill="#F59E0B"/>
        <text x="8" y="12" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">!</text>
        <text x="25" y="6" font-family="Arial" font-size="11" font-weight="bold" fill="#1F2937">Infrastructures insuffisantes</text>
        <text x="25" y="18" font-family="Arial" font-size="9" fill="#6B7280">Centres spécialisés TSA</text>
      </g>
      
      <!-- Formation du personnel -->
      <g transform="translate(0, 50)">
        <circle cx="8" cy="8" r="6" fill="#8B5CF6"/>
        <text x="8" y="12" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">!</text>
        <text x="25" y="6" font-family="Arial" font-size="11" font-weight="bold" fill="#1F2937">Formation inadéquate</text>
        <text x="25" y="18" font-family="Arial" font-size="9" fill="#6B7280">Personnel éducatif et médical</text>
      </g>
      
      <!-- Sensibilisation -->
      <g transform="translate(0, 75)">
        <circle cx="8" cy="8" r="6" fill="#06B6D4"/>
        <text x="8" y="12" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">!</text>
        <text x="25" y="6" font-family="Arial" font-size="11" font-weight="bold" fill="#1F2937">Manque de sensibilisation</text>
        <text x="25" y="18" font-family="Arial" font-size="9" fill="#6B7280">Familles et communautés</text>
      </g>
    </g>
  </g>
  
  <!-- Associations dispersées (pièces de puzzle) -->
  <g opacity="0.6">
    <g transform="translate(50, 50)">
      <rect x="0" y="0" width="15" height="15" fill="#2563EB" rx="3"/>
      <circle cx="15" cy="7.5" r="3" fill="#2563EB"/>
      <text x="7.5" y="25" font-family="Arial" font-size="7" text-anchor="middle" fill="#2563EB">Assoc. 1</text>
    </g>
    
    <g transform="translate(320, 40)">
      <rect x="0" y="0" width="15" height="15" fill="#10B981" rx="3"/>
      <circle cx="-3" cy="7.5" r="3" fill="none" stroke="#10B981" stroke-width="2"/>
      <text x="7.5" y="25" font-family="Arial" font-size="7" text-anchor="middle" fill="#10B981">Assoc. 2</text>
    </g>
    
    <g transform="translate(100, 330)">
      <rect x="0" y="0" width="15" height="15" fill="#F59E0B" rx="3"/>
      <path d="M 7.5 -3 Q 12.5 -3 12.5 2.5 Q 12.5 8 7.5 8" fill="#F59E0B"/>
      <text x="7.5" y="25" font-family="Arial" font-size="7" text-anchor="middle" fill="#F59E0B">Assoc. 3</text>
    </g>
    
    <g transform="translate(300, 320)">
      <rect x="0" y="0" width="15" height="15" fill="#EF4444" rx="3"/>
      <circle cx="7.5" cy="15" r="3" fill="#EF4444"/>
      <text x="7.5" y="35" font-family="Arial" font-size="7" text-anchor="middle" fill="#EF4444">Assoc. 4</text>
    </g>
  </g>
  
  <!-- Message principal avec drapeau sénégalais -->
  <g transform="translate(200, 335)">
    <!-- Petit drapeau du Sénégal -->
    <g transform="translate(-50, -10)">
      <rect x="0" y="0" width="30" height="20" fill="#00A651"/>
      <rect x="10" y="0" width="10" height="20" fill="#FFCD00"/>
      <rect x="20" y="0" width="10" height="20" fill="#E31E24"/>
      <polygon points="15,6 17,8 19,6 17,10 21,10 17,12 19,14 15,14 17,12 13,10 17,10" fill="#00A651"/>
    </g>
    
    <rect x="-120" y="-15" width="240" height="30" fill="white" opacity="0.95" rx="15" stroke="#2563EB" stroke-width="2"/>
    <text x="0" y="-5" font-family="Inter, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1F2937">
      BESOIN URGENT DE COORDINATION
    </text>
    <text x="0" y="8" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#6B7280">
      Pour une prise en charge efficace au Sénégal
    </text>
  </g>
</svg>
