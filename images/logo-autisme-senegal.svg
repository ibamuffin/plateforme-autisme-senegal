<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond circulaire avec les couleurs du Sénégal -->
  <circle cx="60" cy="60" r="58" fill="#00A651" stroke="#FFCD00" stroke-width="4"/>
  
  <!-- Pièces de puzzle représentant l'autisme -->
  <g transform="translate(20, 20)">
    <!-- Pièce 1 - Bleu (haut gauche) -->
    <path d="M 0 15 Q 5 10 15 10 Q 20 5 25 10 Q 30 15 25 20 L 25 35 Q 20 40 15 35 Q 10 30 5 35 L 0 35 Z" 
          fill="#2563EB" stroke="white" stroke-width="2"/>
    
    <!-- Pièce 2 - Vert (haut droite) -->
    <path d="M 35 15 Q 40 10 50 10 Q 55 5 60 10 Q 65 15 60 20 L 60 35 Q 55 40 50 35 Q 45 30 40 35 L 35 35 Z" 
          fill="#10B981" stroke="white" stroke-width="2"/>
    
    <!-- Pièce 3 - Orange (bas gauche) -->
    <path d="M 0 45 Q 5 40 15 40 Q 20 35 25 40 Q 30 45 25 50 L 25 65 Q 20 70 15 65 Q 10 60 5 65 L 0 65 Z" 
          fill="#F59E0B" stroke="white" stroke-width="2"/>
    
    <!-- Pièce 4 - Rouge (bas droite) -->
    <path d="M 35 45 Q 40 40 50 40 Q 55 35 60 40 Q 65 45 60 50 L 60 65 Q 55 70 50 65 Q 45 60 40 65 L 35 65 Z" 
          fill="#EF4444" stroke="white" stroke-width="2"/>
    
    <!-- Symbole infini au centre représentant l'inclusion -->
    <path d="M 27 30 Q 22 25 17 30 Q 12 35 17 40 Q 22 35 27 40 Q 32 45 37 40 Q 42 35 37 30 Q 32 35 27 30" 
          fill="white" opacity="0.9"/>
  </g>
  
  <!-- Étoile du drapeau sénégalais stylisée -->
  <g transform="translate(85, 15)">
    <polygon points="10,2 12,8 18,8 13,12 15,18 10,14 5,18 7,12 2,8 8,8" 
             fill="#FFCD00" stroke="#00A651" stroke-width="1"/>
  </g>
  
  <!-- Texte "SÉNÉGAL" en arc de cercle -->
  <defs>
    <path id="circle-text" d="M 20 60 A 40 40 0 0 1 100 60"/>
  </defs>
  <text font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="white">
    <textPath href="#circle-text" startOffset="50%" text-anchor="middle">
      SÉNÉGAL
    </textPath>
  </text>
  
  <!-- Bordure décorative -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
