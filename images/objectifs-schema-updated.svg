<svg width="450" height="400" viewBox="0 0 450 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrière-plan -->
  <defs>
    <linearGradient id="objectifGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eff6ff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="450" height="400" fill="url(#objectifGrad)"/>
  
  <!-- Drapeau du Sénégal en arrière-plan -->
  <g transform="translate(350, 30)" opacity="0.1">
    <rect x="0" y="0" width="80" height="60" fill="#00A651"/>
    <rect x="25" y="0" width="30" height="60" fill="#FFCD00"/>
    <rect x="55" y="0" width="25" height="60" fill="#E31E24"/>
    <polygon points="40,20 45,25 50,20 45,30 55,30 45,35 50,40 40,40 45,35 35,30 45,30" fill="#00A651"/>
  </g>
  
  <!-- Titre avec contexte sénégalais -->
  <text x="225" y="35" font-family="Inter, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1F2937" filter="url(#textShadow)">
    OBJECTIFS P.A.S
  </text>
  <text x="225" y="55" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2563EB">
    Plateforme des Associations d'Autisme du Sénégal
  </text>
  
  <!-- Cercle central - Logo PAS -->
  <g transform="translate(225, 200)">
    <circle cx="0" cy="0" r="65" fill="#2563EB" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="61" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#FFCD00" stroke-width="2" opacity="0.6"/>
    
    <!-- Logo PAS stylisé -->
    <text x="0" y="-10" font-family="Arial" font-size="32" font-weight="900" text-anchor="middle" fill="white" filter="url(#textShadow)">
      P.A.S
    </text>
    <text x="0" y="8" font-family="Arial" font-size="11" font-weight="600" text-anchor="middle" fill="#FFCD00">
      Plateforme
    </text>
    <text x="0" y="22" font-family="Arial" font-size="11" font-weight="600" text-anchor="middle" fill="#FFCD00">
      Autisme
    </text>
    <text x="0" y="36" font-family="Arial" font-size="11" font-weight="600" text-anchor="middle" fill="#FFCD00">
      Sénégal
    </text>
  </g>
  
  <!-- Objectifs spécifiques en cercle autour -->
  
  <!-- Objectif 1: Concertation avec l'État -->
  <g transform="translate(225, 85)">
    <circle cx="0" cy="0" r="48" fill="#10B981" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -10)">
      <!-- Icône handshake avec l'État -->
      <rect x="-9" y="-7" width="18" height="5" fill="white" rx="2"/>
      <rect x="-11" y="-2" width="22" height="5" fill="white" rx="2"/>
      <circle cx="-7" cy="0" r="2.5" fill="#10B981"/>
      <circle cx="7" cy="0" r="2.5" fill="#10B981"/>
    </g>
    <text x="0" y="10" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      CONCERTATION
    </text>
    <text x="0" y="24" font-family="Arial" font-size="10" font-weight="600" text-anchor="middle" fill="white">
      avec l'État
    </text>
    <text x="0" y="36" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      sénégalais
    </text>
  </g>
  
  <!-- Objectif 2: État des lieux -->
  <g transform="translate(350, 130)">
    <circle cx="0" cy="0" r="43" fill="#F59E0B" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="41" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -7)">
      <!-- Icône diagnostic/recherche -->
      <circle cx="0" cy="0" r="9" stroke="white" stroke-width="3" fill="none"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke="white" stroke-width="3"/>
      <text x="0" y="4" font-family="Arial" font-size="7" font-weight="bold" text-anchor="middle" fill="white">
        TSA
      </text>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      DIAGNOSTIC
    </text>
    <text x="0" y="27" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="white">
      État des lieux
    </text>
    <text x="0" y="38" font-family="Arial" font-size="8" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      national
    </text>
  </g>
  
  <!-- Objectif 3: Renforcer le personnel médical -->
  <g transform="translate(380, 230)">
    <circle cx="0" cy="0" r="43" fill="#EF4444" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -5)">
      <!-- Icône médecin africain -->
      <circle cx="0" cy="-4" r="5" fill="white"/>
      <rect x="-7" y="0" width="14" height="9" fill="white" rx="2"/>
      <!-- Stéthoscope -->
      <circle cx="0" cy="7" r="2.5" fill="#EF4444"/>
      <path d="M -3 5 Q -6 3 -8 5" stroke="white" stroke-width="1.5" fill="none"/>
      <path d="M 3 5 Q 6 3 8 5" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      PERSONNEL
    </text>
    <text x="0" y="24" font-family="Arial" font-size="10" font-weight="600" text-anchor="middle" fill="white" opacity="1.0">
      médical &amp;
    </text>
    <text x="0" y="32" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      paramédical
    </text>
  </g>
  
  <!-- Objectif 4: Programmes éducatifs adaptés -->
  <g transform="translate(350, 320)">
    <circle cx="0" cy="0" r="43" fill="#8B5CF6" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -5)">
      <!-- Livre avec symboles africains -->
      <rect x="-9" y="-4" width="18" height="9" fill="white" rx="2"/>
      <path d="M -7 -2 L 7 -2 M -7 0 L 7 0 M -7 2 L 7 2" stroke="#8B5CF6" stroke-width="1.2"/>
      <!-- Puzzle piece sur le livre -->
      <rect x="-3.5" y="-7" width="7" height="7" fill="#FFCD00" rx="1"/>
      <circle cx="3.5" cy="-3.5" r="1.2" fill="#FFCD00"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      PROGRAMMES
    </text>
    <text x="0" y="24" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="white" opacity="1.0">
      éducatifs
    </text>
    <text x="0" y="32" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      adaptés TSA
    </text>
  </g>
  
  <!-- Objectif 5: Formation des enseignants -->
  <g transform="translate(225, 350)">
    <circle cx="0" cy="0" r="43" fill="#06B6D4" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -5)">
      <!-- Enseignant devant tableau -->
      <circle cx="0" cy="-4" r="3.5" fill="white"/>
      <rect x="-4.5" y="0" width="9" height="7" fill="white" rx="1"/>
      <rect x="-9" y="7" width="18" height="5" fill="rgba(255,255,255,0.85)" rx="1"/>
      <!-- Puzzle sur le tableau -->
      <rect x="-7" y="8" width="3.5" height="3.5" fill="#06B6D4" rx="0.5"/>
      <rect x="-2.5" y="8" width="3.5" height="3.5" fill="#F59E0B" rx="0.5"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      FORMATION
    </text>
    <text x="0" y="24" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="white" opacity="1.0">
      enseignants
    </text>
    <text x="0" y="32" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      sénégalais
    </text>
  </g>
  
  <!-- Objectif 6: Éducation inclusive -->
  <g transform="translate(100, 320)">
    <circle cx="0" cy="0" r="43" fill="#84CC16" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -5)">
      <!-- Groupe d'enfants divers -->
      <circle cx="-7" cy="0" r="3.5" fill="white"/>
      <circle cx="0" cy="0" r="3.5" fill="white"/>
      <circle cx="7" cy="0" r="3.5" fill="white"/>
      <!-- École inclusive -->
      <rect x="-9" y="4" width="18" height="7" fill="rgba(255,255,255,0.85)" rx="2"/>
      <polygon points="-9,4 0,0 9,4" fill="white"/>
      <text x="0" y="9" font-family="Arial" font-size="4.5" font-weight="bold" text-anchor="middle" fill="#84CC16">ÉCOLE</text>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      ÉDUCATION
    </text>
    <text x="0" y="24" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="white" opacity="1.0">
      inclusive
    </text>
    <text x="0" y="32" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      pour tous
    </text>
  </g>
  
  <!-- Objectif 7: Infrastructures spécialisées -->
  <g transform="translate(70, 230)">
    <circle cx="0" cy="0" r="43" fill="#F97316" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -5)">
      <!-- Bâtiment moderne -->
      <rect x="-9" y="-2" width="18" height="9" fill="white" rx="2"/>
      <rect x="-7" y="0" width="3.5" height="3.5" fill="#F97316"/>
      <rect x="-2.5" y="0" width="3.5" height="3.5" fill="#F97316"/>
      <rect x="2" y="0" width="3.5" height="3.5" fill="#F97316"/>
      <!-- Toit -->
      <polygon points="-9,-2 0,-7 9,-2" fill="white"/>
      <!-- Symbole TSA -->
      <rect x="-1.5" y="-4.5" width="3" height="3" fill="#F97316" rx="0.5"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      CENTRES
    </text>
    <text x="0" y="24" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="white" opacity="1.0">
      spécialisés
    </text>
    <text x="0" y="32" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      TSA
    </text>
  </g>
  
  <!-- Objectif 8: Cadre de travail ministériel -->
  <g transform="translate(100, 130)">
    <circle cx="0" cy="0" r="43" fill="#EC4899" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <g transform="translate(0, -5)">
      <!-- Bâtiment gouvernemental -->
      <rect x="-9" y="0" width="18" height="7" fill="white" rx="1"/>
      <rect x="-7" y="2" width="3.5" height="2.5" fill="#EC4899"/>
      <rect x="-1.5" y="2" width="3.5" height="2.5" fill="#EC4899"/>
      <rect x="4" y="2" width="3.5" height="2.5" fill="#EC4899"/>
      <!-- Colonnes -->
      <rect x="-7" y="-4.5" width="1.5" height="4.5" fill="white"/>
      <rect x="-2.5" y="-4.5" width="1.5" height="4.5" fill="white"/>
      <rect x="2" y="-4.5" width="1.5" height="4.5" fill="white"/>
      <rect x="6.5" y="-4.5" width="1.5" height="4.5" fill="white"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="white" filter="url(#textShadow)">
      MINISTÈRES
    </text>
    <text x="0" y="24" font-family="Arial" font-size="9" font-weight="600" text-anchor="middle" fill="white" opacity="1.0">
      partenaires
    </text>
    <text x="0" y="32" font-family="Arial" font-size="9" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.95)">
      Santé-Éducation
    </text>
  </g>
  
  <!-- Lignes de connexion améliorées - s'arrêtent avant le cercle central -->
  <g stroke="#2563EB" stroke-width="3" opacity="0.5" stroke-dasharray="5,3">
    <!-- Du centre vers tous les objectifs - arrêtées à 65px du centre -->
    <line x1="225" y1="135" x2="225" y2="85"/>
    <line x1="270" y1="165" x2="350" y2="130"/>
    <line x1="280" y1="215" x2="380" y2="230"/>
    <line x1="270" y1="255" x2="350" y2="320"/>
    <line x1="225" y1="265" x2="225" y2="350"/>
    <line x1="180" y1="255" x2="100" y2="320"/>
    <line x1="170" y1="215" x2="70" y2="230"/>
    <line x1="180" y1="165" x2="100" y2="130"/>
  </g>
  
  <!-- Indicateur de progression sénégalais -->
  <g transform="translate(225, 380)">
    <rect x="-150" y="-8" width="300" height="16" fill="#E5E7EB" rx="8"/>
    <rect x="-150" y="-8" width="210" height="16" fill="#00A651" rx="8"/>
    <rect x="-150" y="-8" width="150" height="16" fill="#FFCD00" rx="8"/>
    <rect x="-150" y="-8" width="90" height="16" fill="#E31E24" rx="8"/>
    
    <text x="0" y="20" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1F2937">
      VERS UN SÉNÉGAL INCLUSIF POUR LES ENFANTS TSA
    </text>
    <text x="0" y="35" font-family="Arial" font-size="9" text-anchor="middle" fill="#6B7280">
      Progression coordonnée des 7 objectifs spécifiques
    </text>
  </g>
  
  <!-- Logo symbolique Sénégal-Autisme -->
  <g transform="translate(30, 30)" opacity="0.3">
    <circle cx="0" cy="0" r="20" fill="#2563EB"/>
    <rect x="-6" y="-6" width="12" height="12" fill="#FFCD00" rx="2"/>
    <circle cx="6" cy="0" r="2" fill="#FFCD00"/>
  </g>
</svg>
