<svg width="450" height="400" viewBox="0 0 450 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrière-plan -->
  <defs>
    <linearGradient id="objectifGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eff6ff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="450" height="400" fill="url(#objectifGrad)"/>
  
  <!-- Drapeau du Sénégal en arrière-plan -->
  <g transform="translate(350, 30)" opacity="0.1">
    <rect x="0" y="0" width="80" height="60" fill="#00A651"/>
    <rect x="25" y="0" width="30" height="60" fill="#FFCD00"/>
    <rect x="55" y="0" width="25" height="60" fill="#E31E24"/>
    <polygon points="40,20 45,25 50,20 45,30 55,30 45,35 50,40 40,40 45,35 35,30 45,30" fill="#00A651"/>
  </g>
  
  <!-- Titre avec contexte sénégalais -->
  <text x="225" y="35" font-family="Inter, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1F2937" filter="url(#textShadow)">
    OBJECTIFS PLATEFORME SÉNÉGAL
  </text>
  <text x="225" y="55" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">
    Pour améliorer la prise en charge des enfants avec TSA
  </text>
  
  <!-- Cercle central - Objectif général -->
  <g transform="translate(225, 200)">
    <circle cx="0" cy="0" r="60" fill="#2563EB" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    
    <text x="0" y="-15" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
      OBJECTIF GÉNÉRAL
    </text>
    <text x="0" y="0" font-family="Arial" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      Améliorer la prise
    </text>
    <text x="0" y="12" font-family="Arial" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      en charge des
    </text>
    <text x="0" y="24" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFCD00">
      enfants TSA
    </text>
    <text x="0" y="36" font-family="Arial" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.8)">
      au Sénégal
    </text>
  </g>
  
  <!-- Objectifs spécifiques en cercle autour -->
  
  <!-- Objectif 1: Concertation avec l'État -->
  <g transform="translate(225, 90)">
    <circle cx="0" cy="0" r="45" fill="#10B981" filter="url(#shadow)"/>
    <g transform="translate(0, -8)">
      <!-- Icône handshake avec l'État -->
      <rect x="-8" y="-6" width="16" height="4" fill="white" rx="2"/>
      <rect x="-10" y="-2" width="20" height="4" fill="white" rx="2"/>
      <circle cx="-6" cy="0" r="2" fill="#10B981"/>
      <circle cx="6" cy="0" r="2" fill="#10B981"/>
    </g>
    <text x="0" y="10" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="white">
      CONCERTATION
    </text>
    <text x="0" y="22" font-family="Arial" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      avec l'État
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.8)">
      sénégalais
    </text>
  </g>
  
  <!-- Objectif 2: État des lieux -->
  <g transform="translate(350, 130)">
    <circle cx="0" cy="0" r="40" fill="#F59E0B" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Icône diagnostic/recherche -->
      <circle cx="0" cy="0" r="8" stroke="white" stroke-width="3" fill="none"/>
      <line x1="8" y1="8" x2="14" y2="14" stroke="white" stroke-width="3"/>
      <text x="0" y="3" font-family="Arial" font-size="6" font-weight="bold" text-anchor="middle" fill="white">
        TSA
      </text>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      DIAGNOSTIC
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      État des lieux
    </text>
    <text x="0" y="32" font-family="Arial" font-size="7" text-anchor="middle" fill="rgba(255,255,255,0.8)">
      national
    </text>
  </g>
  
  <!-- Objectif 3: Renforcer le personnel médical -->
  <g transform="translate(380, 230)">
    <circle cx="0" cy="0" r="40" fill="#EF4444" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Icône médecin africain -->
      <circle cx="0" cy="-4" r="4" fill="white"/>
      <rect x="-6" y="0" width="12" height="8" fill="white" rx="2"/>
      <!-- Stéthoscope -->
      <circle cx="0" cy="6" r="2" fill="#EF4444"/>
      <path d="M -3 4 Q -5 2 -7 4" stroke="white" stroke-width="1" fill="none"/>
      <path d="M 3 4 Q 5 2 7 4" stroke="white" stroke-width="1" fill="none"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      PERSONNEL
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      médical &amp;
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      paramédical
    </text>
  </g>
  
  <!-- Objectif 4: Programmes éducatifs adaptés -->
  <g transform="translate(350, 320)">
    <circle cx="0" cy="0" r="40" fill="#8B5CF6" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Livre avec symboles africains -->
      <rect x="-8" y="-4" width="16" height="8" fill="white" rx="2"/>
      <path d="M -6 -2 L 6 -2 M -6 0 L 6 0 M -6 2 L 6 2" stroke="#8B5CF6" stroke-width="1"/>
      <!-- Puzzle piece sur le livre -->
      <rect x="-3" y="-6" width="6" height="6" fill="#FFCD00" rx="1"/>
      <circle cx="3" cy="-3" r="1" fill="#FFCD00"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      PROGRAMMES
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      éducatifs
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      adaptés TSA
    </text>
  </g>
  
  <!-- Objectif 5: Formation des enseignants -->
  <g transform="translate(225, 350)">
    <circle cx="0" cy="0" r="40" fill="#06B6D4" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Enseignant devant tableau -->
      <circle cx="0" cy="-4" r="3" fill="white"/>
      <rect x="-4" y="0" width="8" height="6" fill="white" rx="1"/>
      <rect x="-8" y="6" width="16" height="4" fill="rgba(255,255,255,0.8)" rx="1"/>
      <!-- Puzzle sur le tableau -->
      <rect x="-6" y="7" width="3" height="3" fill="#06B6D4" rx="0.5"/>
      <rect x="-2" y="7" width="3" height="3" fill="#F59E0B" rx="0.5"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      FORMATION
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      enseignants
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      sénégalais
    </text>
  </g>
  
  <!-- Objectif 6: Éducation inclusive -->
  <g transform="translate(100, 320)">
    <circle cx="0" cy="0" r="40" fill="#84CC16" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Groupe d'enfants divers -->
      <circle cx="-6" cy="0" r="3" fill="white"/>
      <circle cx="0" cy="0" r="3" fill="white"/>
      <circle cx="6" cy="0" r="3" fill="white"/>
      <!-- École inclusive -->
      <rect x="-8" y="4" width="16" height="6" fill="rgba(255,255,255,0.8)" rx="2"/>
      <polygon points="-8,4 0,0 8,4" fill="white"/>
      <text x="0" y="8" font-family="Arial" font-size="4" text-anchor="middle" fill="#84CC16">ÉCOLE</text>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      ÉDUCATION
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      inclusive
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      pour tous
    </text>
  </g>
  
  <!-- Objectif 7: Infrastructures spécialisées -->
  <g transform="translate(70, 230)">
    <circle cx="0" cy="0" r="40" fill="#F97316" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Bâtiment moderne -->
      <rect x="-8" y="-2" width="16" height="8" fill="white" rx="2"/>
      <rect x="-6" y="0" width="3" height="3" fill="#F97316"/>
      <rect x="-2" y="0" width="3" height="3" fill="#F97316"/>
      <rect x="2" y="0" width="3" height="3" fill="#F97316"/>
      <!-- Toit -->
      <polygon points="-8,-2 0,-6 8,-2" fill="white"/>
      <!-- Symbole TSA -->
      <rect x="-1" y="-4" width="2" height="2" fill="#F97316" rx="0.5"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      CENTRES
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      spécialisés
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      TSA
    </text>
  </g>
  
  <!-- Objectif 8: Cadre de travail ministériel -->
  <g transform="translate(100, 130)">
    <circle cx="0" cy="0" r="40" fill="#EC4899" filter="url(#shadow)"/>
    <g transform="translate(0, -5)">
      <!-- Bâtiment gouvernemental -->
      <rect x="-8" y="0" width="16" height="6" fill="white" rx="1"/>
      <rect x="-6" y="2" width="3" height="2" fill="#EC4899"/>
      <rect x="-1" y="2" width="3" height="2" fill="#EC4899"/>
      <rect x="4" y="2" width="3" height="2" fill="#EC4899"/>
      <!-- Colonnes -->
      <rect x="-6" y="-4" width="1" height="4" fill="white"/>
      <rect x="-2" y="-4" width="1" height="4" fill="white"/>
      <rect x="2" y="-4" width="1" height="4" fill="white"/>
      <rect x="6" y="-4" width="1" height="4" fill="white"/>
    </g>
    <text x="0" y="14" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="white">
      MINISTÈRES
    </text>
    <text x="0" y="24" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      partenaires
    </text>
    <text x="0" y="32" font-family="Arial" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">
      Santé-Éducation
    </text>
  </g>
  
  <!-- Lignes de connexion améliorées -->
  <g stroke="#2563EB" stroke-width="3" opacity="0.4">
    <!-- Du centre vers tous les objectifs -->
    <line x1="225" y1="140" x2="225" y2="90"/>
    <line x1="275" y1="170" x2="350" y2="130"/>
    <line x1="285" y1="210" x2="380" y2="230"/>
    <line x1="275" y1="250" x2="350" y2="320"/>
    <line x1="225" y1="260" x2="225" y2="350"/>
    <line x1="175" y1="250" x2="100" y2="320"/>
    <line x1="165" y1="210" x2="70" y2="230"/>
    <line x1="175" y1="170" x2="100" y2="130"/>
  </g>
  
  <!-- Indicateur de progression sénégalais -->
  <g transform="translate(225, 380)">
    <rect x="-150" y="-8" width="300" height="16" fill="#E5E7EB" rx="8"/>
    <rect x="-150" y="-8" width="210" height="16" fill="#00A651" rx="8"/>
    <rect x="-150" y="-8" width="150" height="16" fill="#FFCD00" rx="8"/>
    <rect x="-150" y="-8" width="90" height="16" fill="#E31E24" rx="8"/>
    
    <text x="0" y="20" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1F2937">
      VERS UN SÉNÉGAL INCLUSIF POUR LES ENFANTS TSA
    </text>
    <text x="0" y="35" font-family="Arial" font-size="9" text-anchor="middle" fill="#6B7280">
      Progression coordonnée des 7 objectifs spécifiques
    </text>
  </g>
  
  <!-- Logo symbolique Sénégal-Autisme -->
  <g transform="translate(30, 30)" opacity="0.3">
    <circle cx="0" cy="0" r="20" fill="#2563EB"/>
    <rect x="-6" y="-6" width="12" height="12" fill="#FFCD00" rx="2"/>
    <circle cx="6" cy="0" r="2" fill="#FFCD00"/>
  </g>
</svg>
