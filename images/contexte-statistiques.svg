<svg width="300" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrière-plan -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="250" fill="url(#bgGrad)"/>
  
  <!-- Hôpital Fann (silhouette) -->
  <g transform="translate(20, 80)">
    <rect x="0" y="40" width="120" height="80" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
    <rect x="10" y="50" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="30" y="50" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="50" y="50" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="70" y="50" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="90" y="50" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    
    <rect x="10" y="70" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="30" y="70" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="50" y="70" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="70" y="70" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    <rect x="90" y="70" width="15" height="15" fill="#3B82F6" opacity="0.7"/>
    
    <!-- Croix rouge -->
    <g transform="translate(60, 20)">
      <rect x="-8" y="-2" width="16" height="4" fill="#EF4444"/>
      <rect x="-2" y="-8" width="4" height="16" fill="#EF4444"/>
    </g>
    
    <!-- Nom de l'hôpital -->
    <text x="60" y="140" font-family="Arial" font-size="8" text-anchor="middle" fill="#374151">
      Centre Pédopsychiatrique FANN
    </text>
  </g>
  
  <!-- Statistiques visuelles -->
  <!-- Représentation 1/160 -->
  <g transform="translate(180, 50)">
    <text x="0" y="0" font-family="Inter" font-size="14" font-weight="bold" fill="#1F2937">
      Statistiques OMS
    </text>
    
    <!-- Grille de personnes -->
    <g transform="translate(0, 15)">
      <!-- 159 personnes normales (petits cercles gris) -->
      <g fill="#CBD5E1" opacity="0.7">
        <!-- Rangée 1 -->
        <circle cx="0" cy="0" r="2"/>
        <circle cx="8" cy="0" r="2"/>
        <circle cx="16" cy="0" r="2"/>
        <circle cx="24" cy="0" r="2"/>
        <circle cx="32" cy="0" r="2"/>
        <circle cx="40" cy="0" r="2"/>
        <circle cx="48" cy="0" r="2"/>
        <circle cx="56" cy="0" r="2"/>
        
        <!-- Rangée 2 -->
        <circle cx="0" cy="8" r="2"/>
        <circle cx="8" cy="8" r="2"/>
        <circle cx="16" cy="8" r="2"/>
        <circle cx="24" cy="8" r="2"/>
        <circle cx="32" cy="8" r="2"/>
        <circle cx="40" cy="8" r="2"/>
        <circle cx="48" cy="8" r="2"/>
        <circle cx="56" cy="8" r="2"/>
        
        <!-- Rangée 3 -->
        <circle cx="0" cy="16" r="2"/>
        <circle cx="8" cy="16" r="2"/>
        <circle cx="16" cy="16" r="2"/>
        <circle cx="24" cy="16" r="2"/>
        <circle cx="32" cy="16" r="2"/>
        <circle cx="40" cy="16" r="2"/>
        <circle cx="48" cy="16" r="2"/>
        <circle cx="56" cy="16" r="2"/>
        
        <!-- Plus de points représentant le reste -->
        <text x="32" y="30" font-family="Arial" font-size="12" text-anchor="middle" fill="#6B7280">...</text>
      </g>
      
      <!-- 1 personne avec autisme (cercle bleu plus grand) -->
      <circle cx="64" cy="8" r="4" fill="#2563EB"/>
      <text x="64" y="20" font-family="Arial" font-size="6" text-anchor="middle" fill="#2563EB">TSA</text>
      
      <!-- Flèche et texte -->
      <text x="32" y="45" font-family="Arial" font-size="10" text-anchor="middle" fill="#1F2937">
        1 personne sur 160
      </text>
    </g>
  </g>
  
  <!-- Statistique Sénégal -->
  <g transform="translate(180, 130)">
    <text x="0" y="0" font-family="Inter" font-size="14" font-weight="bold" fill="#1F2937">
      Au Sénégal
    </text>
    
    <!-- Graphique en barres simple -->
    <g transform="translate(0, 15)">
      <!-- Barre des enfants normaux -->
      <rect x="0" y="0" width="80" height="15" fill="#10B981" opacity="0.7"/>
      <text x="85" y="12" font-family="Arial" font-size="8" fill="#374151">99.2% des enfants</text>
      
      <!-- Barre des enfants avec TSA -->
      <rect x="0" y="20" width="6" height="15" fill="#F59E0B"/>
      <text x="10" y="32" font-family="Arial" font-size="8" fill="#374151">0.8% avec TSA</text>
      
      <!-- Source -->
      <text x="0" y="50" font-family="Arial" font-size="6" fill="#6B7280">
        Source: Centre pédopsychiatrique Fann
      </text>
    </g>
  </g>
  
  <!-- Défis représentés par des icônes -->
  <g transform="translate(50, 160)">
    <text x="0" y="0" font-family="Inter" font-size="12" font-weight="bold" fill="#1F2937">
      Défis actuels
    </text>
    
    <!-- Manque de personnel médical -->
    <g transform="translate(0, 20)">
      <circle cx="8" cy="8" r="6" fill="#EF4444" opacity="0.8"/>
      <text x="8" y="12" font-family="Arial" font-size="8" text-anchor="middle" fill="white">!</text>
      <text x="20" y="12" font-family="Arial" font-size="8" fill="#374151">Personnel médical</text>
    </g>
    
    <!-- Manque d'infrastructures -->
    <g transform="translate(0, 35)">
      <circle cx="8" cy="8" r="6" fill="#F59E0B" opacity="0.8"/>
      <text x="8" y="12" font-family="Arial" font-size="8" text-anchor="middle" fill="white">!</text>
      <text x="20" y="12" font-family="Arial" font-size="8" fill="#374151">Infrastructures</text>
    </g>
    
    <!-- Formation insuffisante -->
    <g transform="translate(120, 20)">
      <circle cx="8" cy="8" r="6" fill="#8B5CF6" opacity="0.8"/>
      <text x="8" y="12" font-family="Arial" font-size="8" text-anchor="middle" fill="white">!</text>
      <text x="20" y="12" font-family="Arial" font-size="8" fill="#374151">Formation</text>
    </g>
    
    <!-- Ressources limitées -->
    <g transform="translate(120, 35)">
      <circle cx="8" cy="8" r="6" fill="#06B6D4" opacity="0.8"/>
      <text x="8" y="12" font-family="Arial" font-size="8" text-anchor="middle" fill="white">!</text>
      <text x="20" y="12" font-family="Arial" font-size="8" fill="#374151">Ressources</text>
    </g>
  </g>
  
  <!-- Pièces de puzzle dispersées symbolisant les associations -->
  <g opacity="0.4">
    <g transform="translate(30, 30)">
      <rect x="0" y="0" width="12" height="12" fill="#2563EB" rx="2"/>
      <circle cx="12" cy="6" r="2" fill="#2563EB"/>
    </g>
    
    <g transform="translate(250, 40)">
      <rect x="0" y="0" width="12" height="12" fill="#10B981" rx="2"/>
      <circle cx="-2" cy="6" r="2" fill="none" stroke="#10B981" stroke-width="1"/>
    </g>
    
    <g transform="translate(80, 200)">
      <rect x="0" y="0" width="12" height="12" fill="#F59E0B" rx="2"/>
      <path d="M 6 -2 Q 11 -2 11 3 Q 11 8 6 8" fill="#F59E0B"/>
    </g>
    
    <g transform="translate(220, 200)">
      <rect x="0" y="0" width="12" height="12" fill="#EF4444" rx="2"/>
      <circle cx="6" cy="12" r="2" fill="#EF4444"/>
    </g>
  </g>
  
  <!-- Message principal -->
  <g transform="translate(150, 220)">
    <rect x="-80" y="-10" width="160" height="20" fill="white" opacity="0.9" rx="10"/>
    <text x="0" y="2" font-family="Inter" font-size="10" font-weight="600" text-anchor="middle" fill="#1F2937">
      Besoin urgent de coordination des efforts
    </text>
  </g>
</svg>
