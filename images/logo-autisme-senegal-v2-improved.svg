<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <!-- Gradient de fond -->
    <radialGradient id="backgroundGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </radialGradient>
    
    <!-- Filtre d'ombre -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(30,64,175,0.4)"/>
    </filter>
    
    <!-- Dégradés pour les mains en cercle - Thème Bleu Autisme -->
    <linearGradient id="hand1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="hand2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="hand3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="hand4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="hand5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="hand6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient bleu autisme pour le texte -->
    <linearGradient id="autismBlueText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filtre d'ombre pour le texte -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="rgba(30,64,175,0.5)"/>
    </filter>
    
    <!-- Filtre pour effet de lueur -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond -->
  <circle cx="100" cy="100" r="98" fill="url(#backgroundGradient)" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Cercle central avec puzzle détaillé de l'autisme -->
  <circle cx="100" cy="100" r="35" fill="url(#centerGradient)" opacity="0.95" filter="url(#dropShadow)"/>
  
  <!-- Puzzle de l'autisme détaillé (4 pièces) - Couleurs Bleu Autisme -->
  <g transform="translate(100, 100)" filter="url(#dropShadow)">
    <!-- Pièce de puzzle 1 (haut-gauche) - Bleu Foncé -->
    <path d="M-17 -17 L-5 -17 Q-5 -22, 0 -22 Q5 -22, 5 -17 L17 -17 Q22 -17, 22 -12 Q22 -7, 17 -7 Q12 -7, 12 -2 L12 2 Q12 7, 7 7 Q2 7, 2 2 L-2 2 Q-7 2, -7 -3 Q-7 -8, -2 -8 L-2 -12 Q-2 -17, -7 -17 Q-12 -17, -12 -12 Q-12 -7, -17 -7 Q-22 -7, -22 -12 Q-22 -17, -17 -17 Z" 
          fill="#1e40af" 
          stroke="white" 
          stroke-width="1.5" 
          opacity="0.95"/>
    <circle cx="-8" cy="-8" r="2" fill="rgba(255,255,255,0.7)"/>
    
    <!-- Pièce de puzzle 2 (haut-droite) - Bleu Moyen -->
    <path d="M17 -17 L5 -17 Q5 -22, 0 -22 Q-5 -22, -5 -17 L-17 -17 Q-22 -17, -22 -12 Q-22 -7, -17 -7 Q-12 -7, -12 -2 L-12 2 Q-12 7, -7 7 Q-2 7, -2 2 L2 2 Q7 2, 7 -3 Q7 -8, 2 -8 L2 -12 Q2 -17, 7 -17 Q12 -17, 12 -12 Q12 -7, 17 -7 Q22 -7, 22 -12 Q22 -17, 17 -17 Z" 
          fill="#2563eb" 
          stroke="white" 
          stroke-width="1.5" 
          opacity="0.95" 
          transform="rotate(90)"/>
    <circle cx="8" cy="-8" r="2" fill="rgba(255,255,255,0.7)" transform="rotate(90)"/>
    
    <!-- Pièce de puzzle 3 (bas-droite) - Bleu Clair -->
    <path d="M17 17 L5 17 Q5 22, 0 22 Q-5 22, -5 17 L-17 17 Q-22 17, -22 12 Q-22 7, -17 7 Q-12 7, -12 2 L-12 -2 Q-12 -7, -7 -7 Q-2 -7, -2 -2 L2 -2 Q7 -2, 7 3 Q7 8, 2 8 L2 12 Q2 17, 7 17 Q12 17, 12 12 Q12 7, 17 7 Q22 7, 22 12 Q22 17, 17 17 Z" 
          fill="#3b82f6" 
          stroke="white" 
          stroke-width="1.5" 
          opacity="0.95" 
          transform="rotate(180)"/>
    <circle cx="8" cy="8" r="2" fill="rgba(255,255,255,0.7)" transform="rotate(180)"/>
    
    <!-- Pièce de puzzle 4 (bas-gauche) - Bleu Très Clair -->
    <path d="M-17 17 L-5 17 Q-5 22, 0 22 Q5 22, 5 17 L17 17 Q22 17, 22 12 Q22 7, 17 7 Q12 7, 12 2 L12 -2 Q12 -7, 7 -7 Q2 -7, 2 -2 L-2 -2 Q-7 -2, -7 3 Q-7 8, -2 8 L-2 12 Q-2 17, -7 17 Q-12 17, -12 12 Q-12 7, -17 7 Q-22 7, -22 12 Q-22 17, -17 17 Z" 
          fill="#60a5fa" 
          stroke="white" 
          stroke-width="1.5" 
          opacity="0.95" 
          transform="rotate(270)"/>
    <circle cx="-8" cy="8" r="2" fill="rgba(255,255,255,0.7)" transform="rotate(270)"/>
    
    <!-- Centre du puzzle - Connexion -->
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="2" fill="url(#centerGradient)"/>
    
    <!-- Lignes de jointure subtiles -->
    <line x1="-17" y1="0" x2="17" y2="0" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
    <line x1="0" y1="-17" x2="0" y2="17" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  </g>
  
  <!-- Mains détaillées en cercle (6 mains) -->
  <!-- Main 1 (en haut) -->
  <g transform="translate(100, 58) scale(0.85) rotate(0)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand1)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand1)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand1)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand1)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand1)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand1)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand1)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Main 2 (en haut à droite) -->
  <g transform="translate(141, 82) scale(0.85) rotate(60)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand2)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand2)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand2)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand2)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand2)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand2)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand2)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Main 3 (en bas à droite) -->
  <g transform="translate(141, 118) scale(0.85) rotate(120)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Main 4 (en bas) -->
  <g transform="translate(100, 142) scale(0.85) rotate(180)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand4)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand4)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand4)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand4)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand4)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand4)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand4)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Main 5 (en bas à gauche) -->
  <g transform="translate(59, 118) scale(0.85) rotate(240)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand5)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand5)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand5)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand5)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand5)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand5)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand5)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Main 6 (en haut à gauche) -->
  <g transform="translate(59, 82) scale(0.85) rotate(300)" filter="url(#dropShadow)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand6)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand6)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand6)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand6)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand6)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand6)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand6)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Étoile centrale (symbole de l'autisme) -->
  <path d="M100 90 L102.5 97 L110 97 L104.5 102 L106.5 109 L100 105 L93.5 109 L95.5 102 L90 97 L97.5 97 Z" 
        fill="#93c5fd" 
        stroke="white" 
        stroke-width="1.5"
        filter="url(#glow)"/>
  
  <!-- Motifs puzzle décoratifs -->
  <g opacity="0.3">
    <circle cx="100" cy="100" r="75" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="100" cy="100" r="85" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Texte mis en exergue avec arrière-plan et effets -->
  <g>
    <!-- Arrière-plan du texte principal avec bordure -->
    <rect x="20" y="162" width="160" height="20" rx="10" ry="10" 
          fill="white" 
          stroke="url(#autismBlueText)" 
          stroke-width="2.5" 
          filter="url(#dropShadow)"/>
    
    <!-- Texte principal avec gradient et ombre - Taille rigoureusement ajustée -->
    <text x="100" y="174.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="800" 
          fill="url(#autismBlueText)" filter="url(#textShadow)" textLength="135" lengthAdjust="spacing">
      ENSEMBLE POUR L'AUTISME
    </text>
    
    <!-- Ligne de séparation décorative -->
    <line x1="30" y1="186" x2="170" y2="186" stroke="#60a5fa" stroke-width="1.5"/>
    
    <!-- Enfants qui jouent (placés en haut du logo) -->
    <g transform="translate(100, 28)" filter="url(#dropShadow)">
      <!-- Arrière-plan oval pour les enfants -->
      <ellipse cx="0" cy="0" rx="48" ry="15" 
               fill="white" 
               stroke="url(#autismBlueText)" 
               stroke-width="2.5" 
               opacity="0.98"/>
      
      <!-- Enfant 1 (à gauche) - Jouant avec un ballon -->
      <g transform="translate(-20, -2)">
        <!-- Tête -->
        <circle cx="0" cy="0" r="4" fill="#FEF3C7" stroke="#2563eb" stroke-width="0.8"/>
        <!-- Cheveux -->
        <path d="M -3 -2 Q -4 -4 -2 -5 Q 0 -5.5 2 -5 Q 4 -4 3 -2" fill="#1e40af"/>
        <!-- Corps -->
        <ellipse cx="0" cy="6" rx="3" ry="5" fill="#2563eb"/>
        <!-- Bras levé -->
        <ellipse cx="-4" cy="4" rx="1.5" ry="3" fill="#FEF3C7" transform="rotate(-45)"/>
        <!-- Ballon -->
        <circle cx="-6" cy="0" r="2.5" fill="#60a5fa" stroke="#2563eb" stroke-width="0.5"/>
        <circle cx="-6" cy="0" r="1" fill="white" opacity="0.6"/>
        <!-- Jambes -->
        <ellipse cx="-1.5" cy="12" rx="1.2" ry="3" fill="#1e40af"/>
        <ellipse cx="1.5" cy="12" rx="1.2" ry="3" fill="#1e40af"/>
      </g>
      
      <!-- Enfant 2 (au centre) - Sautant -->
      <g transform="translate(0, -4)">
        <!-- Tête -->
        <circle cx="0" cy="0" r="4" fill="#FEF3C7" stroke="#3b82f6" stroke-width="0.8"/>
        <!-- Cheveux -->
        <path d="M -3 -2 Q -4 -4 -2 -5 Q 0 -5.5 2 -5 Q 4 -4 3 -2" fill="#3b82f6"/>
        <!-- Corps -->
        <ellipse cx="0" cy="6" rx="3" ry="5" fill="#3b82f6"/>
        <!-- Bras -->
        <ellipse cx="-4" cy="5" rx="1.5" ry="3" fill="#FEF3C7" transform="rotate(-60)"/>
        <ellipse cx="4" cy="5" rx="1.5" ry="3" fill="#FEF3C7" transform="rotate(60)"/>
        <!-- Jambes écartées (saut) -->
        <ellipse cx="-2" cy="12" rx="1.2" ry="3" fill="#2563eb" transform="rotate(-20)"/>
        <ellipse cx="2" cy="12" rx="1.2" ry="3" fill="#2563eb" transform="rotate(20)"/>
        <!-- Étoiles de joie -->
        <path d="M -7 1 L -6.5 2 L -5.5 2 L -6 2.5 L -5.5 3.5 L -7 3 L -8.5 3.5 L -8 2.5 L -8.5 2 L -7.5 2 Z" fill="#93c5fd"/>
        <path d="M 7 1 L 7.5 2 L 8.5 2 L 8 2.5 L 8.5 3.5 L 7 3 L 5.5 3.5 L 6 2.5 L 5.5 2 L 6.5 2 Z" fill="#93c5fd"/>
      </g>
      
      <!-- Enfant 3 (à droite) - Tenant un puzzle -->
      <g transform="translate(20, -2)">
        <!-- Tête -->
        <circle cx="0" cy="0" r="4" fill="#FEF3C7" stroke="#60a5fa" stroke-width="0.8"/>
        <!-- Cheveux -->
        <path d="M -3 -2 Q -4 -4 -2 -5 Q 0 -5.5 2 -5 Q 4 -4 3 -2" fill="#60a5fa"/>
        <!-- Corps -->
        <ellipse cx="0" cy="6" rx="3" ry="5" fill="#60a5fa"/>
        <!-- Bras tenant puzzle -->
        <ellipse cx="4" cy="4" rx="1.5" ry="3" fill="#FEF3C7" transform="rotate(45)"/>
        <!-- Pièce de puzzle -->
        <rect x="5" y="2" width="3" height="2.5" rx="0.5" fill="#1e40af" stroke="white" stroke-width="0.4"/>
        <circle cx="8" cy="3.2" r="0.6" fill="#1e40af"/>
        <!-- Jambes -->
        <ellipse cx="-1.5" cy="12" rx="1.2" ry="3" fill="#3b82f6"/>
        <ellipse cx="1.5" cy="12" rx="1.2" ry="3" fill="#3b82f6"/>
      </g>
      
      <!-- Petits cœurs autour des enfants -->
      <g fill="#93c5fd" opacity="0.8">
        <path d="M -35 0 Q -35 -1.5 -34 -1.5 Q -33 -1.5 -33 0 Q -33 1.5 -35 3 Q -37 1.5 -37 0 Q -37 -1.5 -36 -1.5 Q -35 -1.5 -35 0 Z"/>
        <path d="M 35 0 Q 35 -1.5 36 -1.5 Q 37 -1.5 37 0 Q 37 1.5 35 3 Q 33 1.5 33 0 Q 33 -1.5 34 -1.5 Q 35 -1.5 35 0 Z"/>
      </g>
    </g>
    
    <!-- Pièces de puzzle décoratives -->
    <g fill="#93c5fd" opacity="0.6">
      <rect x="20" y="167" width="3" height="3" rx="0.5"/>
      <rect x="177" y="167" width="3" height="3" rx="0.5"/>
    </g>
  </g>
</svg>
