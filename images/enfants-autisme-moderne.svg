<svg width="380" height="285" viewBox="0 0 380 285" xmlns="http://www.w3.org/2000/svg">
  <!-- Définitions des dégradés et filtres -->
  <defs>
    <!-- Fond dégradé moderne -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dégradé bleu autisme -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dégradé rose -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dégradé vert -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dégradé orange -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Effet de lueur douce -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Ombre portée douce -->
    <filter id="dropShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond avec dégradé -->
  <rect width="380" height="285" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Herbe stylisée en bas -->
  <path d="M0 220 Q95 210, 190 220 T380 220 L380 285 L0 285 Z" fill="url(#greenGrad)" opacity="0.9"/>
  
  <!-- Soleil moderne en haut à droite -->
  <g transform="translate(320, 40)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="25" fill="url(#orangeGrad)"/>
    <circle cx="0" cy="0" r="18" fill="#FEF3C7" opacity="0.8"/>
    <!-- Rayons du soleil -->
    <line x1="0" y1="-32" x2="0" y2="-40" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="23" y1="-23" x2="28" y2="-28" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="0" x2="40" y2="0" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="23" y1="23" x2="28" y2="28" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="32" x2="0" y2="40" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-23" y1="23" x2="-28" y2="28" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-32" y1="0" x2="-40" y2="0" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-23" y1="-23" x2="-28" y2="-28" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Nuages décoratifs -->
  <g opacity="0.4">
    <ellipse cx="60" cy="45" rx="20" ry="12" fill="white"/>
    <ellipse cx="75" cy="42" rx="15" ry="10" fill="white"/>
    <ellipse cx="45" cy="42" rx="15" ry="10" fill="white"/>
  </g>
  
  <!-- Enfant 1 - Garçon bleu (gauche) -->
  <g transform="translate(90, 140)" filter="url(#dropShadow)">
    <!-- Corps -->
    <ellipse cx="0" cy="35" rx="20" ry="32" fill="url(#blueGrad)"/>
    
    <!-- Tête -->
    <circle cx="0" cy="0" r="22" fill="#FBBF24"/>
    
    <!-- Cheveux -->
    <path d="M-18,-5 Q-20,-15, -15,-20 Q-10,-22, -5,-20 Q0,-23, 5,-20 Q10,-22, 15,-20 Q20,-15, 18,-5" fill="#1F2937"/>
    
    <!-- Visage souriant -->
    <circle cx="-7" cy="-3" r="3" fill="#1F2937"/>
    <circle cx="7" cy="-3" r="3" fill="#1F2937"/>
    <path d="M-8,6 Q0,12, 8,6" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Bras levant une pièce de puzzle -->
    <ellipse cx="-15" cy="25" rx="6" ry="18" fill="url(#blueGrad)" transform="rotate(-35, -15, 25)"/>
    <ellipse cx="15" cy="20" rx="6" ry="18" fill="url(#blueGrad)" transform="rotate(45, 15, 20)"/>
    
    <!-- Pièce de puzzle dans la main (bleu) -->
    <g transform="translate(15, 5)">
      <rect x="-8" y="-8" width="16" height="16" fill="#3B82F6" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="0" cy="-12" r="3" fill="#3B82F6" stroke="white" stroke-width="2"/>
      <circle cx="12" cy="0" r="3" fill="white" stroke="#3B82F6" stroke-width="2"/>
    </g>
    
    <!-- Jambes -->
    <ellipse cx="-8" cy="65" rx="7" ry="22" fill="#1E3A8A"/>
    <ellipse cx="8" cy="65" rx="7" ry="22" fill="#1E3A8A"/>
    
    <!-- Chaussures -->
    <ellipse cx="-8" cy="85" rx="9" ry="5" fill="#1F2937"/>
    <ellipse cx="8" cy="85" rx="9" ry="5" fill="#1F2937"/>
  </g>
  
  <!-- Enfant 2 - Fille rose (centre) -->
  <g transform="translate(190, 150)" filter="url(#dropShadow)">
    <!-- Corps -->
    <ellipse cx="0" cy="32" rx="22" ry="30" fill="url(#pinkGrad)"/>
    
    <!-- Tête -->
    <circle cx="0" cy="0" r="20" fill="#FBBF24"/>
    
    <!-- Cheveux longs -->
    <path d="M-18,-3 Q-22,-12, -18,-18 Q-12,-22, 0,-22 Q12,-22, 18,-18 Q22,-12, 18,-3 L15,8 Q12,5, 8,8 L5,5 Q2,8, -2,8 L-5,5 Q-8,8, -12,5 L-15,8 Z" fill="#1F2937"/>
    
    <!-- Noeud dans les cheveux -->
    <ellipse cx="18" cy="-8" rx="5" ry="3" fill="#EC4899"/>
    <ellipse cx="22" cy="-8" rx="5" ry="3" fill="#EC4899"/>
    
    <!-- Visage souriant -->
    <circle cx="-6" cy="-2" r="2.5" fill="#1F2937"/>
    <circle cx="6" cy="-2" r="2.5" fill="#1F2937"/>
    <path d="M-7,5 Q0,10, 7,5" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Bras avec pièce de puzzle -->
    <ellipse cx="-16" cy="22" rx="6" ry="17" fill="url(#pinkGrad)" transform="rotate(-40, -16, 22)"/>
    <ellipse cx="16" cy="22" rx="6" ry="17" fill="url(#pinkGrad)" transform="rotate(40, 16, 22)"/>
    
    <!-- Pièce de puzzle dans la main (rose) -->
    <g transform="translate(-18, 8)">
      <rect x="-8" y="-8" width="16" height="16" fill="#EC4899" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="-12" cy="0" r="3" fill="white" stroke="#EC4899" stroke-width="2"/>
      <circle cx="0" cy="12" r="3" fill="#EC4899" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Jambes -->
    <ellipse cx="-7" cy="60" rx="7" ry="20" fill="#BE185D"/>
    <ellipse cx="7" cy="60" rx="7" ry="20" fill="#BE185D"/>
    
    <!-- Chaussures -->
    <ellipse cx="-7" cy="78" rx="8" ry="5" fill="#1F2937"/>
    <ellipse cx="7" cy="78" rx="8" ry="5" fill="#1F2937"/>
  </g>
  
  <!-- Enfant 3 - Enfant vert (droite) -->
  <g transform="translate(280, 145)" filter="url(#dropShadow)">
    <!-- Corps -->
    <ellipse cx="0" cy="33" rx="19" ry="30" fill="url(#greenGrad)"/>
    
    <!-- Tête -->
    <circle cx="0" cy="0" r="21" fill="#FBBF24"/>
    
    <!-- Cheveux bouclés -->
    <circle cx="-12" cy="-12" r="7" fill="#1F2937"/>
    <circle cx="-5" cy="-16" r="7" fill="#1F2937"/>
    <circle cx="5" cy="-16" r="7" fill="#1F2937"/>
    <circle cx="12" cy="-12" r="7" fill="#1F2937"/>
    <circle cx="15" cy="-3" r="6" fill="#1F2937"/>
    <circle cx="-15" cy="-3" r="6" fill="#1F2937"/>
    
    <!-- Visage joyeux -->
    <circle cx="-7" cy="-2" r="3" fill="#1F2937"/>
    <circle cx="7" cy="-2" r="3" fill="#1F2937"/>
    <path d="M-8,6 Q0,13, 8,6" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Bras -->
    <ellipse cx="-14" cy="23" rx="6" ry="16" fill="url(#greenGrad)" transform="rotate(-30, -14, 23)"/>
    <ellipse cx="14" cy="23" rx="6" ry="16" fill="url(#greenGrad)" transform="rotate(30, 14, 23)"/>
    
    <!-- Pièce de puzzle dans la main (vert) -->
    <g transform="translate(16, 10)">
      <rect x="-8" y="-8" width="16" height="16" fill="#10B981" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="0" cy="-12" r="3" fill="white" stroke="#10B981" stroke-width="2"/>
      <circle cx="12" cy="0" r="3" fill="#10B981" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Jambes -->
    <ellipse cx="-7" cy="61" rx="7" ry="21" fill="#047857"/>
    <ellipse cx="7" cy="61" rx="7" ry="21" fill="#047857"/>
    
    <!-- Chaussures -->
    <ellipse cx="-7" cy="80" rx="8" ry="5" fill="#1F2937"/>
    <ellipse cx="7" cy="80" rx="8" ry="5" fill="#1F2937"/>
  </g>
  
  <!-- Pièces de puzzle flottantes décoratives -->
  <g opacity="0.7" filter="url(#softGlow)">
    <!-- Pièce orange -->
    <g transform="translate(50, 80)">
      <rect x="-10" y="-10" width="20" height="20" fill="url(#orangeGrad)" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="0" cy="-14" r="4" fill="white" stroke="#F59E0B" stroke-width="2"/>
    </g>
    
    <!-- Pièce bleue -->
    <g transform="translate(330, 120)">
      <rect x="-9" y="-9" width="18" height="18" fill="url(#blueGrad)" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="-13" cy="0" r="3.5" fill="white" stroke="#2563EB" stroke-width="2"/>
    </g>
    
    <!-- Pièce rose -->
    <g transform="translate(140, 50)">
      <rect x="-8" y="-8" width="16" height="16" fill="url(#pinkGrad)" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="12" cy="0" r="3" fill="white" stroke="#EC4899" stroke-width="2"/>
    </g>
    
    <!-- Petite pièce verte -->
    <g transform="translate(250, 70)">
      <rect x="-7" y="-7" width="14" height="14" fill="url(#greenGrad)" stroke="white" stroke-width="2" rx="2"/>
      <circle cx="0" cy="11" r="3" fill="white" stroke="#10B981" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Coeurs flottants symbolisant l'amour et le soutien -->
  <g opacity="0.6">
    <path d="M30,100 Q28,96, 30,93 Q32,90, 35,90 Q38,90, 40,93 Q42,90, 45,90 Q48,90, 50,93 Q52,96, 50,100 Q47,104, 40,110 Q33,104, 30,100" fill="#EF4444"/>
    <path d="M340,180 Q338,177, 340,175 Q341,173, 343,173 Q345,173, 346,175 Q347,173, 349,173 Q351,173, 352,175 Q354,177, 352,180 Q350,183, 346,187 Q342,183, 340,180" fill="#EF4444"/>
  </g>
  
  <!-- Étoiles scintillantes -->
  <g fill="#FBBF24" opacity="0.7">
    <circle cx="25" cy="60" r="2"/>
    <circle cx="28" cy="63" r="1"/>
    <circle cx="350" cy="200" r="2"/>
    <circle cx="353" cy="197" r="1"/>
    <circle cx="120" cy="30" r="1.5"/>
    <circle cx="300" cy="45" r="1.5"/>
  </g>
  
  <!-- Message inspirant en bas (optionnel) -->
  <text x="190" y="270" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#2563EB" text-anchor="middle" opacity="0.8">
    Ensemble, brillons différemment ✨
  </text>
</svg>
