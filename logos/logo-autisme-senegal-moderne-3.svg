<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <!-- Gradient circulaire bleu autisme -->
        <radialGradient id="circleBlue">
            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
        </radialGradient>
        
        <!-- Gradient pour la lettre -->
        <linearGradient id="letterGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient pour les swoosh -->
        <linearGradient id="swooshGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
        </linearGradient>
        
        <filter id="glow3">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Fond blanc -->
    <rect width="200" height="200" fill="white" opacity="0.98"/>
    
    <!-- Cercle de base -->
    <circle cx="100" cy="90" r="55" fill="url(#circleBlue)" opacity="0.15"/>
    <circle cx="100" cy="90" r="50" fill="none" stroke="url(#circleBlue)" stroke-width="3" opacity="0.6"/>
    
    <!-- Lettre "P" moderne au centre avec design circulaire -->
    <g filter="url(#glow3)">
        <!-- Corps du P vertical -->
        <rect x="80" y="55" width="12" height="70" fill="url(#letterGrad3)" rx="2"/>
        
        <!-- Partie arrondie du P -->
        <path d="M 92 55 L 115 55 Q 130 55 130 72 Q 130 89 115 89 L 92 89 Z" 
              fill="url(#letterGrad3)"/>
        
        <!-- Swoosh circulaire haut -->
        <path d="M 135 65 Q 150 60 155 75 Q 157 85 145 88" 
              fill="url(#swooshGrad3)" opacity="0.7"/>
        
        <!-- Swoosh circulaire bas gauche -->
        <path d="M 65 95 Q 50 100 48 115 Q 47 125 58 127" 
              fill="url(#swooshGrad3)" opacity="0.7"/>
        
        <!-- Swoosh circulaire bas droite -->
        <path d="M 135 95 Q 150 100 152 115 Q 153 125 142 127" 
              fill="url(#swooshGrad3)" opacity="0.7"/>
    </g>
    
    <!-- Pièces de puzzle disposées en cercle autour du P -->
    <g>
        <!-- Puzzle haut -->
        <g transform="translate(100, 35)">
            <circle cx="0" cy="-2.5" r="2" fill="#dbeafe"/>
            <rect x="-4" y="-1" width="8" height="8" fill="#3b82f6" rx="1"/>
        </g>
        
        <!-- Puzzle droite -->
        <g transform="translate(145, 90)">
            <circle cx="2.5" cy="0" r="2" fill="#dbeafe"/>
            <rect x="-1" y="-4" width="8" height="8" fill="#2563eb" rx="1"/>
        </g>
        
        <!-- Puzzle bas -->
        <g transform="translate(100, 145)">
            <circle cx="0" cy="2.5" r="2" fill="#dbeafe"/>
            <rect x="-4" y="-1" width="8" height="8" fill="#3b82f6" rx="1"/>
        </g>
        
        <!-- Puzzle gauche -->
        <g transform="translate(55, 90)">
            <circle cx="-2.5" cy="0" r="2" fill="#dbeafe"/>
            <rect x="-1" y="-4" width="8" height="8" fill="#2563eb" rx="1"/>
        </g>
    </g>
    
    <!-- Texte -->
    <text x="100" y="175" font-family="Inter, Arial, sans-serif" font-size="7" font-weight="600" 
          fill="#1e40af" text-anchor="middle" textLength="130" lengthAdjust="spacing">
        ENSEMBLE POUR L'AUTISME
    </text>
</svg>
