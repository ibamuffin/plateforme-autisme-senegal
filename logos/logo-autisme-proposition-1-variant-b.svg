<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- PROPOSITION 1 - VARIANTE B: Mains Naturelles en Célébration -->
  
  <defs>
    <radialGradient id="bgGrad1b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow1b" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(30,64,175,0.35)"/>
    </filter>
    
    <linearGradient id="h1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="h2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    
    <linearGradient id="h3b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    
    <linearGradient id="h4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    
    <linearGradient id="h5b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    
    <linearGradient id="h6b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <!-- Définition d'une main en célébration (paumes vers l'avant, doigts vers le haut) -->
    <g id="celebrationHand">
      <!-- Paume organique orientée vers l'avant -->
      <path d="M-3.5 6 C-4.5 4, -5 1.5, -4.8 -1 C-4.5 -3.5, -3 -5.5, -1 -6.5 C1 -7, 3.5 -6.5, 5 -4.5 C6 -2.5, 6.2 0, 5.5 2.5 C4.5 5, 2 6.5, 0 7 C-1.5 7.2, -2.8 6.8, -3.5 6 Z"/>
      
      <!-- Pouce (sur le côté, légèrement écarté) -->
      <path d="M-4.5 1 C-6 0.5, -7.5 -0.5, -8.5 -2 C-9.2 -3.5, -9.3 -4.8, -8.8 -5.5 C-8.2 -5.3, -7.5 -4.3, -6.8 -2.8 C-5.8 -1, -5 0.3, -4 1 Z"/>
      
      <!-- Index (pointant vers le haut) -->
      <path d="M-2.8 -6.2 C-3 -8, -3 -10, -2.8 -12 C-2.6 -13.5, -2.2 -14.3, -1.7 -14.5 C-1.2 -14.2, -1 -13.3, -1 -11.8 C-1 -9.8, -1.2 -7.8, -1.5 -6.3 Z"/>
      
      <!-- Majeur (le plus long, vers le haut) -->
      <path d="M-0.2 -6.8 C-0.3 -9, -0.3 -11.5, -0.2 -13.5 C0 -15.2, 0.4 -16, 0.9 -16.2 C1.4 -15.9, 1.6 -15, 1.6 -13.3 C1.5 -11.3, 1.3 -8.8, 1 -6.9 Z"/>
      
      <!-- Annulaire (vers le haut) -->
      <path d="M2.2 -6.5 C2.1 -8.5, 2.1 -10.8, 2.3 -12.5 C2.5 -13.8, 2.9 -14.5, 3.4 -14.6 C3.9 -14.3, 4.1 -13.5, 4.1 -12.2 C4 -10.5, 3.8 -8.2, 3.5 -6.6 Z"/>
      
      <!-- Auriculaire (petit doigt vers le haut) -->
      <path d="M4.8 -5.8 C4.8 -7.5, 4.9 -9.2, 5.1 -10.5 C5.3 -11.5, 5.6 -12, 6 -12.1 C6.4 -11.9, 6.5 -11.2, 6.5 -10.2 C6.4 -8.9, 6.2 -7.2, 5.9 -5.9 Z"/>
      
      <!-- Poignet -->
      <ellipse cx="0" cy="8.5" rx="4.5" ry="2.8" opacity="0.9"/>
      
      <!-- Reflets lumineux sur la paume -->
      <ellipse cx="-1" cy="1" rx="1.8" ry="2.5" fill="white" opacity="0.35"/>
      <ellipse cx="1.5" cy="-1" rx="1.3" ry="1.8" fill="white" opacity="0.25"/>
    </g>
  </defs>
  
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad1b)" stroke="#2563eb" stroke-width="2"/>
  
  <!-- 6 Mains en célébration disposées en cercle -->
  <g transform="translate(100, 50) scale(1.15) rotate(0)" filter="url(#shadow1b)" fill="url(#h1b)">
    <use href="#celebrationHand"/>
  </g>
  
  <g transform="translate(150, 75) scale(1.15) rotate(60)" filter="url(#shadow1b)" fill="url(#h2b)">
    <use href="#celebrationHand"/>
  </g>
  
  <g transform="translate(150, 125) scale(1.15) rotate(120)" filter="url(#shadow1b)" fill="url(#h3b)">
    <use href="#celebrationHand"/>
  </g>
  
  <g transform="translate(100, 150) scale(1.15) rotate(180)" filter="url(#shadow1b)" fill="url(#h4b)">
    <use href="#celebrationHand"/>
  </g>
  
  <g transform="translate(50, 125) scale(1.15) rotate(240)" filter="url(#shadow1b)" fill="url(#h5b)">
    <use href="#celebrationHand"/>
  </g>
  
  <g transform="translate(50, 75) scale(1.15) rotate(300)" filter="url(#shadow1b)" fill="url(#h6b)">
    <use href="#celebrationHand"/>
  </g>
  
  <!-- Puzzle central -->
  <g transform="translate(100, 100)" filter="url(#shadow1b)">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.95"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#1e40af" opacity="0.3"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#2563eb" opacity="0.3" transform="rotate(90)"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#3b82f6" opacity="0.3" transform="rotate(180)"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#60a5fa" opacity="0.3" transform="rotate(270)"/>
    <circle cx="0" cy="0" r="6" fill="url(#h1b)"/>
  </g>
  
  <path d="M100 95 L100.8 97 L103 97 L101.3 98.5 L102 100.5 L100 99.2 L98 100.5 L98.7 98.5 L97 97 L99.2 97 Z" 
        fill="#93c5fd" opacity="0.3"/>
  
  <!-- Texte -->
  <g transform="translate(100, 192)">
    <rect x="-75" y="-14" width="150" height="22" rx="11" fill="white" opacity="0.95" filter="url(#shadow1b)"/>
    <rect x="-75" y="-14" width="150" height="22" rx="11" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="800" 
          fill="#1e40af" text-anchor="middle" textLength="140" lengthAdjust="spacing" letter-spacing="0.5">
      ENSEMBLE POUR L'AUTISME
    </text>
  </g>
</svg>
