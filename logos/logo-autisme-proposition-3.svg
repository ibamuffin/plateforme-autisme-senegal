<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- PROPOSITION 3: Mains Monumentales + Symbole Minimal -->
  <!-- Mains dominantes, un seul petit symbole central épuré, pas d'étoile -->
  
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="rgba(30,64,175,0.4)"/>
    </filter>
    
    <!-- Gradients bleu autisme pour mains -->
    <linearGradient id="hand1p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="hand2p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    
    <linearGradient id="hand3p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    
    <linearGradient id="hand4p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    
    <linearGradient id="hand5p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    
    <linearGradient id="hand6p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="centerSymbol" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <circle cx="100" cy="100" r="98" fill="url(#bg3)" stroke="#2563eb" stroke-width="3"/>
  
  <!-- MAINS MONUMENTALES (échelle 1.5 - très grandes!) -->
  
  <!-- Main 1 (haut) -->
  <g transform="translate(100, 42) scale(1.5) rotate(0)" filter="url(#shadow3)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand1p3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand1p3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand1p3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand1p3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand1p3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand1p3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand1p3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Main 2 (haut-droite) -->
  <g transform="translate(158, 68) scale(1.5) rotate(60)" filter="url(#shadow3)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand2p3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand2p3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand2p3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand2p3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand2p3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand2p3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand2p3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Main 3 (bas-droite) -->
  <g transform="translate(158, 132) scale(1.5) rotate(120)" filter="url(#shadow3)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand3p3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand3p3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand3p3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand3p3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand3p3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand3p3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand3p3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Main 4 (bas) -->
  <g transform="translate(100, 158) scale(1.5) rotate(180)" filter="url(#shadow3)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand4p3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand4p3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand4p3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand4p3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand4p3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand4p3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand4p3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Main 5 (bas-gauche) -->
  <g transform="translate(42, 132) scale(1.5) rotate(240)" filter="url(#shadow3)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand5p3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand5p3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand5p3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand5p3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand5p3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand5p3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand5p3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Main 6 (haut-gauche) -->
  <g transform="translate(42, 68) scale(1.5) rotate(300)" filter="url(#shadow3)">
    <ellipse cx="0" cy="-2" rx="8" ry="12" fill="url(#hand6p3)"/>
    <ellipse cx="-5" cy="-10" rx="2" ry="6" fill="url(#hand6p3)"/>
    <ellipse cx="-2" cy="-12" rx="2.2" ry="7" fill="url(#hand6p3)"/>
    <ellipse cx="1" cy="-11" rx="2.2" ry="6.5" fill="url(#hand6p3)"/>
    <ellipse cx="4" cy="-9" rx="2" ry="5" fill="url(#hand6p3)"/>
    <ellipse cx="-7" cy="-5" rx="2.5" ry="4" fill="url(#hand6p3)" transform="rotate(-30)"/>
    <rect x="-4" y="8" width="8" height="8" rx="3" fill="url(#hand6p3)"/>
    <path d="M-2 0 Q0 2, 2 0" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- SYMBOLE CENTRAL MINIMAL (cercle simple avec petit puzzle) -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="18" fill="white" opacity="0.95" filter="url(#shadow3)"/>
    <circle cx="0" cy="0" r="12" fill="url(#centerSymbol)" opacity="0.9"/>
    
    <!-- Mini puzzle symbolique (4 petites pièces) -->
    <path d="M-6 -6 L-2 -6 Q-2 -8, 0 -8 Q2 -8, 2 -6 L6 -6 L6 -2 Q8 -2, 8 0 Q8 2, 6 2 L6 6 L2 6 Q2 8, 0 8 Q-2 8, -2 6 L-6 6 L-6 2 Q-8 2, -8 0 Q-8 -2, -6 -2 Z" 
          fill="white" 
          opacity="0.5"/>
    
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Pas d'étoile visible -->
  
  <!-- Texte mis en exergue avec fond décoratif élégant -->
  <g transform="translate(100, 195)">
    <!-- Fond gradient bleu subtil -->
    <rect x="-75" y="-11" width="150" height="19" rx="9.5" fill="url(#centerSymbol)" opacity="0.12"/>
    
    <!-- Fond blanc principal -->
    <rect x="-75" y="-11" width="150" height="19" rx="9.5" fill="white" opacity="0.95" filter="url(#shadow3)"/>
    
    <!-- Double bordure pour effet premium -->
    <rect x="-76" y="-12" width="152" height="21" rx="10.5" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
    <rect x="-75" y="-11" width="150" height="19" rx="9.5" fill="none" stroke="#1e40af" stroke-width="2.5"/>
    
    <!-- Petits points décoratifs aux coins -->
    <circle cx="-65" cy="-2" r="1.5" fill="#2563eb" opacity="0.6"/>
    <circle cx="65" cy="-2" r="1.5" fill="#2563eb" opacity="0.6"/>
    
    <!-- Texte agrandi et ultra-gras -->
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="900" 
          fill="#1e40af" text-anchor="middle" textLength="140" lengthAdjust="spacing"
          letter-spacing="0.5">
      ENSEMBLE POUR L'AUTISME
    </text>
  </g>
</svg>
