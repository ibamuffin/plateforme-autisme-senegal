<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- PROPOSITION 1 - VARIANTE C: Mains Naturelles en Offrande -->
  
  <defs>
    <radialGradient id="bgGrad1c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow1c" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(30,64,175,0.35)"/>
    </filter>
    
    <filter id="glow1c" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="h1c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="h2c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    
    <linearGradient id="h3c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    
    <linearGradient id="h4c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    
    <linearGradient id="h5c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    
    <linearGradient id="h6c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <!-- Définition d'une main en offrande (paumes courbées vers le haut) -->
    <g id="offeringHand">
      <!-- Paume courbée formant un bol -->
      <path d="M-4.5 4 C-5.5 2.5, -6 0, -5.5 -2.5 C-5 -5, -3.5 -6.5, -1.5 -7.2 C0.5 -7.5, 2.5 -7, 4 -5.5 C5.5 -4, 6.2 -1.5, 6 1 C5.8 3.5, 4.5 5.5, 2.5 6.5 C0.5 7.2, -1.5 7, -3 6 C-4 5.2, -4.2 4.5, -4.5 4 Z"/>
      
      <!-- Pouce (enroulé sur le côté) -->
      <path d="M-5 0 C-6.5 -0.8, -8 -2, -8.8 -3.5 C-9.5 -5, -9.5 -6.2, -9 -6.8 C-8.4 -6.5, -7.5 -5.5, -6.7 -4 C-5.5 -2, -4.8 -0.5, -4.2 0.5 Z"/>
      
      <!-- Index (courbé doucement vers l'intérieur) -->
      <path d="M-3 -7 C-3.5 -9, -3.8 -11, -3.8 -12.8 C-3.7 -14, -3.3 -14.6, -2.8 -14.7 C-2.3 -14.4, -2 -13.5, -1.9 -12.3 C-1.8 -10.5, -1.9 -8.5, -2.2 -7.1 Z"/>
      
      <!-- Majeur (le plus long, courbé vers l'intérieur) -->
      <path d="M-0.5 -7.5 C-0.8 -9.8, -1 -12.2, -0.9 -14 C-0.8 -15.3, -0.4 -15.9, 0.1 -16 C0.6 -15.7, 0.9 -14.8, 0.9 -13.5 C0.8 -11.7, 0.6 -9.3, 0.3 -7.6 Z"/>
      
      <!-- Annulaire (courbé vers l'intérieur) -->
      <path d="M1.8 -7.2 C1.6 -9.3, 1.5 -11.5, 1.6 -13 C1.7 -14.2, 2.1 -14.7, 2.6 -14.8 C3.1 -14.5, 3.4 -13.7, 3.4 -12.5 C3.3 -10.8, 3.1 -8.8, 2.8 -7.3 Z"/>
      
      <!-- Auriculaire (légèrement courbé) -->
      <path d="M4 -6.5 C3.9 -8.2, 3.9 -9.8, 4 -11 C4.2 -11.9, 4.5 -12.3, 4.9 -12.4 C5.3 -12.1, 5.5 -11.5, 5.5 -10.6 C5.4 -9.4, 5.2 -7.8, 5 -6.6 Z"/>
      
      <!-- Poignet -->
      <ellipse cx="0" cy="8" rx="4.2" ry="3" opacity="0.9"/>
      
      <!-- Aura douce autour de la paume -->
      <ellipse cx="0" cy="0" rx="6" ry="5" fill="white" opacity="0.15" filter="url(#glow1c)"/>
      
      <!-- Lignes de paume courbées -->
      <path d="M-3 1 Q-1 2.5, 1.5 2" stroke="rgba(255,255,255,0.4)" stroke-width="0.7" fill="none"/>
      <path d="M-2.5 3.5 Q-0.5 4.5, 2 3.8" stroke="rgba(255,255,255,0.3)" stroke-width="0.6" fill="none"/>
    </g>
  </defs>
  
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad1c)" stroke="#2563eb" stroke-width="2"/>
  
  <!-- 6 Mains en offrande disposées en cercle -->
  <g transform="translate(100, 50) scale(1.15) rotate(0)" filter="url(#shadow1c)" fill="url(#h1c)">
    <use href="#offeringHand"/>
  </g>
  
  <g transform="translate(150, 75) scale(1.15) rotate(60)" filter="url(#shadow1c)" fill="url(#h2c)">
    <use href="#offeringHand"/>
  </g>
  
  <g transform="translate(150, 125) scale(1.15) rotate(120)" filter="url(#shadow1c)" fill="url(#h3c)">
    <use href="#offeringHand"/>
  </g>
  
  <g transform="translate(100, 150) scale(1.15) rotate(180)" filter="url(#shadow1c)" fill="url(#h4c)">
    <use href="#offeringHand"/>
  </g>
  
  <g transform="translate(50, 125) scale(1.15) rotate(240)" filter="url(#shadow1c)" fill="url(#h5c)">
    <use href="#offeringHand"/>
  </g>
  
  <g transform="translate(50, 75) scale(1.15) rotate(300)" filter="url(#shadow1c)" fill="url(#h6c)">
    <use href="#offeringHand"/>
  </g>
  
  <!-- Puzzle central avec aura -->
  <g transform="translate(100, 100)" filter="url(#shadow1c)">
    <circle cx="0" cy="0" r="28" fill="#93c5fd" opacity="0.2" filter="url(#glow1c)"/>
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.95"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#1e40af" opacity="0.3"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#2563eb" opacity="0.3" transform="rotate(90)"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#3b82f6" opacity="0.3" transform="rotate(180)"/>
    <path d="M-12 -12 L-3 -12 Q-3 -15, 0 -15 Q3 -15, 3 -12 L12 -12 L12 -3 Q15 -3, 15 0 Q15 3, 12 3 L12 12 L3 12 Q3 15, 0 15 Q-3 15, -3 12 L-12 12 L-12 3 Q-15 3, -15 0 Q-15 -3, -12 -3 Z" 
          fill="#60a5fa" opacity="0.3" transform="rotate(270)"/>
    <circle cx="0" cy="0" r="6" fill="url(#h1c)"/>
  </g>
  
  <path d="M100 95 L100.8 97 L103 97 L101.3 98.5 L102 100.5 L100 99.2 L98 100.5 L98.7 98.5 L97 97 L99.2 97 Z" 
        fill="#93c5fd" opacity="0.3"/>
  
  <!-- Texte -->
  <g transform="translate(100, 192)">
    <rect x="-75" y="-14" width="150" height="22" rx="11" fill="white" opacity="0.95" filter="url(#shadow1c)"/>
    <rect x="-75" y="-14" width="150" height="22" rx="11" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="800" 
          fill="#1e40af" text-anchor="middle" textLength="140" lengthAdjust="spacing" letter-spacing="0.5">
      ENSEMBLE POUR L'AUTISME
    </text>
  </g>
</svg>
