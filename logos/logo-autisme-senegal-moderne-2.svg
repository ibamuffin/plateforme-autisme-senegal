<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <!-- Gradient couleurs Sénégal avec bleu autisme -->
        <linearGradient id="senegalBlend" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00853f;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f9ca24;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient ruban vert -->
        <linearGradient id="ribbonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00853f;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient ruban jaune -->
        <linearGradient id="ribbonYellow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f9ca24;stop-opacity:1" />
        </linearGradient>
        
        <filter id="softShadow2">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.25"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Fond blanc -->
    <rect width="200" height="200" fill="white" opacity="0.98"/>
    
    <!-- Lettre "A" stylisée pour "Autisme" avec rubans entrelacés -->
    <g filter="url(#softShadow2)">
        <!-- Jambe gauche du A -->
        <path d="M 70 150 L 90 60 L 105 60 L 85 150 Z" fill="url(#senegalBlend)"/>
        
        <!-- Jambe droite du A -->
        <path d="M 95 60 L 110 60 L 130 150 L 115 150 Z" fill="url(#senegalBlend)"/>
        
        <!-- Barre horizontale du A -->
        <rect x="80" y="105" width="40" height="10" fill="url(#senegalBlend)" opacity="0.9"/>
        
        <!-- Ruban vert swoosh (gauche) -->
        <path d="M 50 80 Q 55 70 65 75 Q 70 78 68 85 L 60 120 Q 58 128 50 125 Q 42 122 45 115 Z" 
              fill="url(#ribbonGreen)" opacity="0.85"/>
        
        <!-- Ruban jaune swoosh (droite) -->
        <path d="M 150 80 Q 145 70 135 75 Q 130 78 132 85 L 140 120 Q 142 128 150 125 Q 158 122 155 115 Z" 
              fill="url(#ribbonYellow)" opacity="0.85"/>
        
        <!-- Pièces de puzzle intégrées -->
        <g transform="translate(100, 75)">
            <!-- Puzzle 1 -->
            <circle cx="-8" cy="-3" r="2.5" fill="#dbeafe"/>
            <rect x="-13" y="-1" width="10" height="10" fill="#2563eb" rx="1"/>
            
            <!-- Puzzle 2 -->
            <circle cx="8" cy="-3" r="2.5" fill="#dbeafe"/>
            <rect x="3" y="-1" width="10" height="10" fill="#2563eb" rx="1"/>
        </g>
    </g>
    
    <!-- Texte -->
    <text x="100" y="175" font-family="Inter, Arial, sans-serif" font-size="7" font-weight="600" 
          fill="#1f2937" text-anchor="middle" textLength="130" lengthAdjust="spacing">
        ENSEMBLE POUR L'AUTISME
    </text>
    
    <!-- Étoile sénégalaise stylisée -->
    <g transform="translate(100, 35)">
        <polygon points="0,-6 1.5,-2 6,-2 2,1 3.5,5 0,2.5 -3.5,5 -2,1 -6,-2 -1.5,-2" 
                 fill="#00853f" opacity="0.7"/>
    </g>
</svg>
